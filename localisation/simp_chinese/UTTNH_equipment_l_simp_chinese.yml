 GER_mechanized_equipment_1: "Sd.Kfz 250号特种机动车"
 GER_mechanized_equipment_1_short: "Sd.Kfz 250号特种机动车"
 GER_mechanized_equipment_1_desc: "Sd.Kfz. 11特种机动车是二战中广泛使用的德国产半履带车辆，可以携带8人部队并牵引炮或车辆。"
 GER_mechanized_equipment_2: "SdKfz 251号特种机动车"
 GER_mechanized_equipment_2_short: "Sd.Kfz 251号特种机动车"
 GER_mechanized_equipment_2_desc: "Sd.Kfz 250号特种机动车是一种轻型装甲半履带车，外形与汉诺马格公司设计的更大的Sd.Kfz 251号特种机动车非常相似，由德马格公司制造，供纳粹德国在第二次世界大战中使用。大多数型号都是敞篷的，并且在后部有一个单扇出入舱门。"
 GER_mechanized_equipment_3: "Gep. MTW 小猫特种全履带机动车"
 GER_mechanized_equipment_3_short: "Gep. MTW 小猫特种全履带机动车"
 GER_mechanized_equipment_3_desc: "Gep. MTW 小猫特种全履带机动车诞生于二战末期德国军备研发困境之中的一款装甲运兵车项目。 由汽车联盟公司负责， 在1944-45年间仅生产出两辆原型车。该项目仍具有一定的技术意义。 车体设计借鉴了虎王坦克的布局，但进行了小型化处理。 该车采用较为罕见的前轮驱动设计，以及具有特色的多重叠式钢制负重轮， 部分资料认为其设计理念可能受到E-25 坦克替代方案的影响。 动力方面，则配备了迈巴赫HL50 P型发动机。"
 GER_mechanized_equipment_4: "HS.30长款步兵战车"
 GER_mechanized_equipment_4_short: "HS.30步兵战车"
 GER_mechanized_equipment_5: "SdKfz 411号特种机动车"
 GER_mechanized_equipment_5_short: "Sd.Kfz 411号特种机动车"
 GER_amphibious_tank_equipment_1: "二号两栖坦克"
 GER_amphibious_tank_equipment_2: "三号潜水坦克"
 GER_amphibious_tank_equipment_3: "四号潜水坦克"
 GER_amphibious_mechanized_equipment_1: "LWS 水陆两栖牵引车"
 GER_amphibious_mechanized_equipment_1_short: "LWS 水陆两栖牵引车"
 GER_amphibious_mechanized_equipment_2: "二号水陆两栖牵引车"
 GER_amphibious_mechanized_equipment_2_short: "LWS II型"
 GER_amphibious_mechanized_equipment_3: "三号水陆两栖牵引车"
 GER_amphibious_mechanized_equipment_3_short: "LWS III型"
 GER_amphibious_mechanized_equipment_4: "四号水陆两栖牵引车"
 GER_amphibious_mechanized_equipment_4_short: "LWS IV型"
 GER_gw_tank_equipment: "A7V突击坦克"
 GER_gw_tank_equipment_short: "A7V型"
 GER_gw_tank_equipment_desc: "A7V是一种重型坦克，由德国在第一次世界大战的1918年推出。 从1918年3月到10月，A7V坦克被投入到战场上， 是第一次世界大战期间德国唯一参与战斗的自产坦克型号。"
 GER_light_tank_equipment_1: "一号坦克"
 GER_light_tank_equipment_1_short: "一号坦克"
 GER_light_tank_equipment_1_desc: "一号坦克是德国在20世纪30年代制造的一种轻型坦克。一号坦克的设计工作始于1932年，到1934年开始大规模投产。尽管I号坦克最初的设计用途只是当做德国陆军掌握装甲战争理念的训练工具，但是由于德国缺乏现代坦克，所以一号坦克在战争中得到了广泛地使用。"
 GER_light_tank_equipment_2: "二号坦克"
 GER_light_tank_equipment_2_short: "二号坦克"
 GER_light_tank_equipment_2_desc: "二号坦克最初是作为权宜之计而设计的，当时更大、更先进的坦克正在开发中，但由于缺乏更强大的坦克，它在战斗中得到了广泛的应用。"
 GER_light_tank_equipment_3: "VK1602 豹式轻型坦克"
 GER_light_tank_equipment_3_short: "豹式轻型坦克"
 GER_light_tank_equipment_3_desc: "VK1602豹式是德国在1942年计划研发的一款侦察车辆。 该车辆最初计划配备KwK 41 75毫米火炮，但后来改为较小的50毫米火炮。 VK1602的设计受到了黑豹中型坦克的影响，采用了倾斜的前装甲设计。 为了提高越野性能，VK1602还配备了350毫米宽的履带。"
 GER_light_tank_equipment_5: "KanJPz 火炮式坦克歼击车"
 GER_light_tank_equipment_5_short: "KanJPz 火炮式坦克歼击车"
 GER_light_tank_equipment_6: "鼬鼠 AWC轻型坦克"
 GER_light_tank_equipment_6_short: "鼬鼠 AWC轻型坦克"
 GER_light_tank_equipment_7: "鼬鼠 AWC轻型坦克"
 GER_light_tank_equipment_7_short: "鼬鼠 AWC轻型坦克"
 GER_light_tank_equipment_7_desc: "轻型坦克以其体积小、行动敏捷的特点，不仅能够承担侦察任务，还具备一定的对付轻型装甲目标的能力。"
 GER_light_tank_equipment_8: "鼬鼠 2 AWC轻型坦克"
 GER_light_tank_equipment_8_short: "鼬鼠 2 AWC轻型坦克"
 GER_light_tank_artillery_equipment_1: "二号突击炮"
 GER_light_tank_artillery_equipment_1_short: "二号突击炮"
 GER_light_tank_artillery_equipment_1_desc: "为了解决机械化步兵团附属步兵炮连所使用的牵引火炮在战斗中难以跟上坦克部队的问题，最简单的办法是将富余的坦克底盘进行改造，使其具备运载火炮投入作战的能力。 这种理念的代表作正是利用了一号坦克的底盘野牛自行火炮。"
 GER_light_tank_artillery_equipment_2: "黄蜂 Sd. Kfz. 124自行火炮"
 GER_light_tank_artillery_equipment_2_short: "黄蜂 Sd. Kfz. 124自行火炮"
 GER_light_tank_artillery_equipment_2_desc: "黄蜂 Sd.Kfz. 124自行火炮是一种德国自行火炮，它基于经过改进的二号坦克底盘打造。"
 GER_light_tank_artillery_equipment_3: "豹式自行火炮"
 GER_light_tank_artillery_equipment_3_short: "豹式自行火炮"
 GER_light_tank_artillery_equipment_3_desc: "基于VK1602豹式底盘开发的豹式自行火炮是一种实验中的自行火炮。"
 GER_light_tank_destroyer_equipment_2: "黄鼠狼式 三号坦克歼击车"
 GER_light_tank_destroyer_equipment_2_short: "黄鼠狼式 三号坦克歼击车"
 GER_light_tank_destroyer_equipment_1: "黄鼠狼式 Pak40 75毫米型二号坦克歼击车"
 GER_light_tank_destroyer_equipment_1_short: "黄鼠狼式 二号坦克歼击车"
 GER_light_tank_destroyer_equipment_1_desc: "黄鼠狼 二号坦克歼击车是德国以二号坦克底盘为基础研制的坦克歼击车。"
 GER_light_tank_destroyer_equipment_3: "豹式坦克歼击车"
 GER_light_tank_destroyer_equipment_3_short: "豹式坦克歼击车"
 GER_light_tank_destroyer_equipment_3_desc: "豹式坦克歼击车从豹式 VK1602坦克改装而来。"
 GER_light_tank_aa_equipment_1: "一号防空坦克"
 GER_light_tank_aa_equipment_1_short: "一号防空坦克"
 GER_light_tank_aa_equipment_1_desc: "基于I号坦克底盘改装的自行防空炮。"
 GER_light_tank_aa_equipment_2: "Sd Kfz 10-5特种机动车&Flak 38 20毫米突击防空炮"
 GER_light_tank_aa_equipment_2_short: "Sd Kfz 10-5特种机动车&Flak 38 20毫米突击防空炮"
 GER_light_tank_aa_equipment_3: "FlakPz 1602防空坦克"
 GER_light_tank_aa_equipment_3_short: "FlakPz 1602防空坦克"
 GER_light_tank_aa_equipment_3_desc: "基于VK1602坦克底盘改装的自行防空炮。"
 GER_medium_tank_equipment_1: "三号坦克"
 GER_medium_tank_equipment_1_short: "三号坦克"
 GER_medium_tank_equipment_1_desc: "早在1934至1935年，海因茨·古德里安将军便前瞻性地提出了未来德国装甲师的两大核心装备构想。 一类是装备反坦克炮与两挺机枪的作战车辆，另一类是提供火力支援、装备大口径火炮的支援车辆。 最终，这些设想促成了三号坦克和四号坦克的诞生，其中三号坦克被确定为坦克营下属轻型连队的标准配置。"
 GER_medium_tank_equipment_2: "四号坦克"
 GER_medium_tank_equipment_2_short: "四号坦克"
 GER_medium_tank_equipment_2_desc: "最初，四号坦克的设计定位是步兵支援，而非与敌方装甲部队直接对抗——对抗装甲部队的任务原本由较轻型的三号坦克承担。但随着战前战术思想的局限性暴露，以及苏联T-34坦克的出现，四号坦克迅速转型为坦克歼击力量，并逐渐取代了日益落后的三号坦克。 作为二战期间德国产量最大、应用最广泛的坦克，四号坦克同时也是诸多作战车辆的设计基础。"
 GER_medium_tank_equipment_3: "黑豹 五号坦克"
 GER_medium_tank_equipment_3_short: "黑豹 五号坦克"
 GER_medium_tank_equipment_3_desc: "黑豹 五号坦克是二战期间德国于1943年中期至1945年欧洲战场结束期间部署的一款中型坦克，是为对抗苏联T-34坦克，并取代三号和四号坦克而设计的。尽管未能完全取代四号坦克，但它与四号坦克以及更重型的“虎”式坦克一同服役至战争结束。黑豹集火力、机动性和防护性于一身，堪称完美结合，成为了其他国家在二战后期及战后坦克设计的标杆，并被誉为二战最佳坦克之一。"
 GER_medium_tank_equipment_4: "狮式 七号坦克"
 GER_medium_tank_equipment_4_short: "狮式 七号坦克"
 GER_medium_tank_equipment_4_desc: "狮式 七号坦克是克虏伯公司在二战期间为德国政府设计的一种超重型坦克。该项目最初的代号为VK 70.01 (K)，但其从未离开设计图纸，并于1942年3月5至6日被放弃，转而支持保时捷公司更为重型的鼠式 八号坦克。"
 GER_heavy_tank_artillery_equipment_1: "大麦克斯 四号自行火炮"
 GER_heavy_tank_artillery_equipment_1_short: "大麦克斯 四号自行火炮"
 GER_heavy_tank_artillery_equipment_2: "突击虎 六号自行火炮"
 GER_heavy_tank_artillery_equipment_2_short: "突击虎 六号自行火炮"
 GER_heavy_tank_artillery_equipment_4: "E-100自行火炮"
 GER_heavy_tank_artillery_equipment_4_short: "E-100自行火炮"
 GER_heavy_tank_artillery_equipment_4_desc: "这款自行火炮采用超重型坦克底盘，并搭载一门210毫米口径的火炮，其威力足以媲美某些铁道炮。"
 GER_medium_tank_artillery_equipment_1: "蟋蟀式自行火炮"
 GER_medium_tank_artillery_equipment_1_short: "蟋蟀式自行火炮"
 GER_medium_tank_artillery_equipment_1_desc: "蟋蟀 Sd.Kfz. 138/1自行火炮是二战期间德军装备的一款自行火炮，总产量约为490-500辆。 主要配属于驻苏联的装甲师，同时也出现在波兰和法国的德军部队中。 该型火炮一直服役到1945年，曾在突尼斯战场与盟军的火炮及坦克部队交战。"
 GER_medium_tank_artillery_equipment_2: "野蜂式自行火炮"
 GER_medium_tank_artillery_equipment_2_short: "野蜂式自行火炮"
 GER_medium_tank_artillery_equipment_2_desc: "野蜂式自行火炮是二战期间德国国防军所使用的自行火炮，其底盘为三/四号自行火炮底盘，并搭载一门150毫米榴弹炮。该自行火炮从1943年初开始服役，直至战争结束。"
 GER_medium_tank_artillery_equipment_3: "灰熊突击炮"
 GER_medium_tank_artillery_equipment_3_short: "灰熊突击炮"
 GER_medium_tank_artillery_equipment_4: "灰熊II型突击炮"
 GER_medium_tank_artillery_equipment_4_short: "灰熊II型突击炮"
 GER_medium_tank_destroyer_equipment_1: "三号突击炮"
 GER_medium_tank_destroyer_equipment_1_short: "三号G型突击炮"
 GER_medium_tank_destroyer_equipment_1_desc: "三号突击炮是二战时期德国生产数量最多的装甲战斗车辆。该突击炮采用性能可靠的三号坦克底盘，最初的设计目的是为步兵提供机动、装甲化的轻型火炮支援。 然而，经过持续改进，三号突击炮也被大量用作坦克歼击车。"
 GER_medium_tank_destroyer_equipment_2: "四号坦克歼击车"
 GER_medium_tank_destroyer_equipment_2_short: "四号坦克歼击车"
 GER_medium_tank_destroyer_equipment_2_desc: "四号坦克歼击车配属于装甲师以及武装党卫队装甲师的反坦克连队，曾参加诺曼底战役、突出部战役和东线战事。作为专业的坦克歼击车， “猎豹IV”表现出色；但和其他同类武器一样，当被当作坦克或突击炮使用时，其作战效能则大打折扣。 然而，在战争后期，由于缺乏足够的坦克，四号坦克歼击车也越来越多地被权宜性地用作坦克的替代品。"
 GER_medium_tank_destroyer_equipment_3: "猎豹 五号坦克歼击车"
 GER_medium_tank_destroyer_equipment_3_short: "猎豹 五号坦克歼击车"
 GER_medium_tank_destroyer_equipment_3_desc: "猎豹 五号坦克歼击车是纳粹德国在二战期间以黑豹 五号坦克底盘为基础研发的。它于战争后期的1944年开始服役，并在东线和西线都投入了使用。猎豹 五号坦克歼击车结合了虎 II B型六号坦克强大的PaK 43 88毫米火炮以及黑豹 五号坦克底盘出色的装甲和悬挂系统。 但由于德国在战争后期国力衰竭，导致产量较少、备件短缺以及乘员训练不足。"
 GER_medium_tank_destroyer_equipment_4: "E-50 猎豹 II型坦克歼击车 "
 GER_medium_tank_destroyer_equipment_4_short: "E-50 猎豹 II型坦克歼击车 "
 GER_medium_tank_destroyer_equipment_4_desc: ""
 GER_medium_tank_aa_equipment_1: "家具车 三号防空坦克"
 GER_medium_tank_aa_equipment_1_short: "家具车 三号防空坦克"
 GER_medium_tank_aa_equipment_1_desc: "这款自行防空炮的炮塔在收起状态时呈方盒状，因此得名家具车。它以三号坦克底盘为基础，配备一门20毫米四联装防空炮。"
 GER_medium_tank_aa_equipment_2: "东风 四号防空坦克"
 GER_medium_tank_aa_equipment_2_short: "东风 四号防空坦克"
 GER_medium_tank_aa_equipment_2_desc: "东风 四号防空坦克是二战期间德国基于四号坦克底盘设计的一种自行高射炮，于 1944 年推出，旨在替代早期的四号防空坦克。它为了容纳FlaK 43 型 37毫米高射炮而拆除了原坦克的炮塔，取而代之的是一个敞开式的六边形炮塔。 虽然全封闭炮塔的设计在理论上更为优秀，但因高射炮开火时会产生大量浓烟，这个方案最终未能被采纳。"
 GER_medium_tank_aa_equipment_3: "旋风 四号防空坦克"
 GER_medium_tank_aa_equipment_3_short: "旋风 四号防空坦克"
 GER_medium_tank_aa_equipment_4: "球状闪电 四号防空坦克"
 GER_medium_tank_aa_equipment_4_short: "球状闪电 四号防空坦克"
 GER_heavy_tank_equipment_1: "大型拖拉机"
 GER_heavy_tank_equipment_1_short: "大型拖拉机"
 GER_heavy_tank_equipment_1_desc: "大型拖拉机是德国设计制造的一系列用于开发重型坦克的原型车辆。 第一次世界大战后，《凡尔赛条约》对德国军事力量的发展施加了严格限制。 为绕过这些限制，德国发起了一项代号为拖拉机的秘密项目， 秘密研制装甲车辆和火炮等军事装备。"
 GER_heavy_tank_equipment_2: "虎式 六号重型坦克"
 GER_heavy_tank_equipment_2_short: "虎式 六号重型坦克"
 GER_heavy_tank_equipment_2_desc: "由于在巴巴罗萨行动初期， 德军遭遇到了T-34和KV-1等苏联坦克的顽强抵抗，并认识到现有坦克无法有效对抗这些新型坦克, 德国于1942年紧急启动了重型坦克项目, 最终催生了虎 I型 六号重型坦克。"
 GER_heavy_tank_equipment_3: "虎式 六号B型重型坦克"
 GER_heavy_tank_equipment_3_short: "虎王 六号重型坦克"
 GER_heavy_tank_equipment_3_desc: "Königstiger，常被盟军士兵半直译为虎王，也是该坦克的俗称。在设计理念上，虎 II型重型坦克沿袭了虎 I型重型坦克的思路，但力求达到更强大的性能。为此，虎 II型重型坦克融合了虎 I型重型坦克的厚重装甲与黑豹中型坦克所采用的倾斜装甲技术。这使得虎II的战斗全重接近70吨，正面装甲厚度达到100至180毫米，主武器则是一门威力强大的KwK 43 71倍径/88毫米炮长身管火炮。"
 GER_heavy_tank_equipment_4: "鼠式 八号重型坦克"
 GER_heavy_tank_equipment_4_short: "鼠式 八号重型坦克"
 GER_heavy_tank_equipment_4_desc: "Königstiger，常被盟军士兵半直译为虎王，也是该坦克的俗称。在设计理念上，虎 II型重型坦克沿袭了虎 I型重型坦克的思路，但力求达到更强大的性能。为此，虎 II型重型坦克融合了虎 I型重型坦克的厚重装甲与黑豹中型坦克所采用的倾斜装甲技术。这使得虎II的战斗全重接近70吨，正面装甲厚度达到100至180毫米，主武器则是一门威力强大的KwK 43 71倍径/88毫米炮长身管火炮。"
 GER_heavy_tank_equipment_5: "E-100重型坦克"
 GER_heavy_tank_equipment_5_short: "E-100重型坦克"
 GER_heavy_tank_equipment_5_desc: "E-100型坦克（Gerät 383）（TG-01）是二战末期德国研发设计的一款超重型坦克。 该设计曾计划作为重型火炮系统、防空车辆和重型坦克歼击车的基础。"
 GER_heavy_tank_artillery_equipment_3: "虎式自行火炮"
 GER_heavy_tank_artillery_equipment_3_short: "虎式自行火炮"
 GER_heavy_tank_artillery_equipment_3_desc: "该坦克在设计中采用虎王坦克的底盘，并安装一门K 72 50倍径/170毫米火炮。"
 GER_heavy_tank_destroyer_equipment_1: "斯图尔·埃米尔 VK3001(H)坦克歼击车"
 GER_heavy_tank_destroyer_equipment_1_short: "斯图尔·埃米尔 VK3001(H)坦克歼击车"
 GER_heavy_tank_destroyer_equipment_1_desc: "斯图尔·埃米尔 VK3001(H)坦克歼击车是二战时期德国以亨舍尔公司生产的VK3001（H）坦克底盘为基础，开发出的一款坦克歼击车。"
 GER_heavy_tank_destroyer_equipment_2: "虎式(P)坦克歼击车"
 GER_heavy_tank_destroyer_equipment_2_short: "象式坦克歼击车"
 GER_heavy_tank_destroyer_equipment_2_desc: "象式重型坦克歼击车是德国基于被取消的保时捷虎式坦克项目底盘，所研发的一款装备Pak 43/2 型 88毫米反坦克炮的重型坦克歼击车。"
 GER_heavy_tank_destroyer_equipment_3: "猎虎B型 六号坦克歼击车"
 GER_heavy_tank_destroyer_equipment_3_short: "猎虎B型 六号坦克歼击车"
 GER_heavy_tank_destroyer_equipment_3_desc: "猎虎坦克歼击车是二战期间实际投入使用的最重型装甲战斗车辆，其主要武器为一门PaK 44 55倍径/128毫米火炮，并且拥有非常厚重的正面装甲，防护能力极强。"
 GER_heavy_tank_destroyer_equipment_4: "猎鼠坦克歼击车"
 GER_heavy_tank_destroyer_equipment_4_short: "猎鼠坦克歼击车"
 GER_heavy_tank_destroyer_equipment_4_desc: "基于鼠式坦克的底盘，安装有一门固定式150毫米火炮。"
 GER_heavy_tank_aa_equipment_1: "Sd.Kfz. 7/2 Flak八吨自行防空炮"
