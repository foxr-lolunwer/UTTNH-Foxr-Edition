 infantry_equipment_4: "Assault Rifles I"
 infantry_equipment_4_short: "Assault Rifles I"
 infantry_equipment_4_desc: "The so-called assault rifle - a select fire, medium-weight rifle which can either lay down a hail of fire or engage in accurate marksmanship over 500 meters. While assault rifles are bulkier than older models, they were vastly superior to even the best of the bolt-action or semi-automatic rifles. As such, they would replace most other small arms in service, except for the machinegun and sidearm."
 infantry_equipment_5: "Assault Rifles II"
 infantry_equipment_5_short: "Assault Rifles II"
 infantry_equipment_5_desc: "Despite everything, the humble rifleman is still the most important component of any army in the world. To this end, a modernized assault rifle making use of composite materials, an intermediate cartridge, and special plastics, can give a single soldier the firepower of thirty bolt-action-equipped men."
 infantry_equipment_6: "Assault Rifles III"
 infantry_equipment_6_short: "Assault Rifles III"
 infantry_equipment_6_desc: "Further advancements in ergonomics and materials allow the development of a lighter, more compact assault rifle. With special 'rails' that can hold attachments, such as grips or sights, this is the first of the space-age guns."
 infantry_equipment_7: "Assault Rifles IV"
 infantry_equipment_7_short: "Assault Rifles IV"
 infantry_equipment_7_desc: "In years past, a carbine was a shorter gun used on horseback. The development of smokeless powder made the carbine generally obsolete barring a few models, but it has seen a resurgence in recent decades. With a smaller cartridge than previous assault rifles, the 'assault carbine' is nonetheless a lethal addition, as well as being easier to carry and use in the urban environments so common with modern warfare."
 infantry_equipment_8: "Assault Rifles V"
 infantry_equipment_8_short: "Assault Rifles V"
 infantry_equipment_8_desc:"As countries experimented with caseless cartridges, bullpup designs and electronics, the assault rifle continues to advance even to this day. The modern assault rifle is a lightweight design, firing an intermediate cartridge either fully automatic, burst-fire or semi-automatic, using easily interchangeable magazines and coming equipped with a wide variety of accessories."
 
 infantry_at3: "RPG I"
 infantry_at4: "RPG II"
 infantry_at5: "RPG III"
 infantry_at6: "RPG IV"
 
 
 motorized_equipment_0: "Liberty Truck"
 motorized_equipment_1: "GMC CCKW"
 motorized_equipment_2: "M54 TRUCK"
 motorized_equipment_2_desc: "As our mechanized and armored forces become faster and faster, we must not let our motorized troops fall behind. By using newer engines and novel 5-speed transmissions, the modern cargo truck can keep up with a racing tank."
 motorized_equipment_3: "M55 TRUCK"
 motorized_equipment_3_desc: "As superchargers become common, even a modest diesel engine can develop enough power to move a heavy cargo truck at highway speeds."
 motorized_equipment_4: "Motorized 1980"
 motorized_equipment_4_desc: "The improvement in fuel quality allows us to develop a new engine with much higher compression and much closer tolerances, resulting in greatly improved power output."
 motorized_equipment_5: "Motorized 1980"
 motorized_equipment_4_desc: "The modern truck must not just be fast, it must also be capable of operating in any terrain. An all-wheel drive system, combined with multiple gearboxes and a heavy turbocharged engine, results in a vehicle which can cross country much faster than before."
 motorized_equipment_6: "Motorized 1990"
 motorized_equipment_6_desc: "By using fuel injection and turbochargers, as well as electronic control units, vehicles of the future will outrun even the fastest trucks of the last generation."
 
 
