l_simp_chinese:
  FLTE_events.1.title: "欢迎使用FL的更多建筑"
  FLTE_events.1.desc: "因为一些原因，无法在开局调用建筑转换模块，因此设计了这个开局事件。\n\n在本模组中，基础设施最大等级为25，对原版等级做乘四计算；空军基地、海军基地、陆地堡垒最大等级为20，对原版等级做乘二计算。\n因为基础设施等级被放大了，同时为了保证兼容性。奖励基础设施等级的效果作用较弱。因为HOI4无法获取最大基础设施等级，因此一些描述中的最大基础设施等级往往指的是原版的5级，其他建筑同理。\n-陆地堡垒的加成已从每级15%降至每级5%。\n-每级空军基地提供100单位容量"
  FLTE_events.1.a: ""