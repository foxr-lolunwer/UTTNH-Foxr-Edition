 anti_air_equipment_1: "Towed Anti-Air"
 anti_air_equipment_1_short: "Anti-Air"
 anti_air_equipment_1_desc: "Anti-air artillery is primarily designed to shoot down hostile planes, although the rapid fire cannons can also be effective against ground targets."
 anti_air_equipment_4: "50' Anti-Air"
 anti_air_equipment_4_desc: "By using smaller but higher-velocity cannons, even the modern jet cannot hope to outrun the anti-aircraft cannon."
 anti_air_equipment_5: "60' Anti-Air"
 anti_air_equipment_5_desc: "One of the limitations of anti-aircraft artillery is the need for the gun barrel to cool down. By using multiple barrels, rotating the assembly and firing out of one at a time, a much higher rate of fire can be achieved. Such weapons will carve a line through the sky, tearing aircraft to shreds."
 anti_air_equipment_6: "70' SAM"
 anti_air_equipment_6_desc: "The SAM - surface-to-air missile - is a system which uses automatically-guided missiles, fitted with an explosive charge, to shoot down planes instead of simple cannons."
 anti_air_equipment_7: "80' SAM"
 anti_air_equipment_7_desc: "By further integrating radar into the SAM launcher, as well as using more advanced tracking circuits, the accuracy of the missiles can be greatly improved."
 anti_air_equipment_8: "90' SAM"
 anti_air_equipment_8_desc: "As flare and chaff countermeasures result in SAMs missing their target, redundant systems and tighter tolerances result in a missile which will down any plane at any distance."

 TUR_anti_air_equipment_4: "MIM-14 Nike"
 TUR_anti_air_equipment_4_desc: "By using smaller but higher-velocity cannons, even the modern jet cannot hope to outrun the anti-aircraft cannon."
 TUR_anti_air_equipment_5: "MIM-23 HAWK"
 TUR_anti_air_equipment_5_desc: "One of the limitations of anti-aircraft artillery is the need for the gun barrel to cool down. By using multiple barrels, rotating the assembly and firing out of one at a time, a much higher rate of fire can be achieved. Such weapons will carve a line through the sky, tearing aircraft to shreds."
