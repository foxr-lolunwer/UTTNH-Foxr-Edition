 YUG_jet_fighter_equipment_4_desc: "米高扬-格列维奇 米格-21战斗机 (北约代号：鱼窝) 是苏联米高扬-格列维奇设计局开发的超音速喷气式战斗机及截击机。"
 YUG_jet_fighter_equipment_5: "米高扬-格列维奇 米格-21 萨普菲尔雷达型"
 YUG_jet_fighter_equipment_5_short: "米格-21S"
 YUG_jet_fighter_equipment_6: "米高扬-格列维奇 米格-23"
 YUG_jet_fighter_equipment_6_short: "米格-23"
 YUG_jet_fighter_equipment_6_desc: "米高扬-格列维奇 米格-23（北约代号：鞭挞者）是由苏联米高扬-格列维奇设计局出品的一款革命性的变后掠翼战斗机。 作为第三代喷气式战斗机，它不仅是全球产量最高的变后掠翼飞机，也代表了苏联航空工业的巅峰水准，其设计思路与苏-15 酒壶等机型一脉相承。 米格-23率先装备了下视下射雷达和超视距导弹，使得苏联空军首次具备了全天候、超视距的空战能力。"
 YUG_jet_fighter_equipment_7: "米高扬-格列耶维奇 米格-23 萨普菲尔ML雷达型"
 YUG_jet_fighter_equipment_7_short: "米格-23ML"
 YUG_jet_fighter_equipment_7_desc: "米高扬-格列维奇 米格-23（北约代号：鞭挞者）是由苏联米高扬-格列维奇设计局出品的一款革命性的变后掠翼战斗机。 作为第三代喷气式战斗机，它不仅是全球产量最高的变后掠翼飞机，也代表了苏联航空工业的巅峰水准，其设计思路与苏-15 酒壶等机型一脉相承。 米格-23率先装备了下视下射雷达和超视距导弹，使得南斯拉夫空军首次具备了全天候、超视距的空战能力。"
