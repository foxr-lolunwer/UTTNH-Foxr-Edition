 USA_jet_fighter_equipment_3: "北美 F-100 超级军刀"
 USA_jet_fighter_equipment_3_short: "F-100 超级军刀"
 USA_jet_fighter_equipment_3_desc: "北美航空公司F-100 超级军刀是美国一款超音速喷气战斗机，曾在1954至1971年间在美国空军服役，其后在美国空军国民警卫队服役至1979年。作为美国空军“世纪系列”的首架战斗机，它是美国空军第一种具备水平超音速飞行能力的战斗机。F-100由北美航空公司开发，设计用于取代F-86“佩刀”战斗机，成为性能更强大的新一代空优战斗机。"
