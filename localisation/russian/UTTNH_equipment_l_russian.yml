 GER_light_tank_equipment_2: "Panzerkampfwagen II"
 GER_light_tank_equipment_2_short: "Panzer II"
 GER_light_tank_equipment_2_desc: "Pz.Kpfw. II создавался в качестве временной меры, пока велась разработка более современных образцов, однако принял активное участие в боевых действиях."
 GER_light_tank_equipment_3: "VK1602 «Леопард»"
 GER_light_tank_equipment_3_short: "«Леопард»"
 GER_light_tank_equipment_3_desc: "VK1602 «Леопард» был экспериментальным немецким разведывательным танком, разработанным в 1942 году. На него планировалось установить 75-мм пушку Kwk 41, но потом калибр орудия уменьшили до 50 мм. VK1602 был оборудован наклонной лобовой броней, схожей с бронированием танка «Пантера». Чтобы улучшить проходимость, на него устанавливались широкие 350-мм траки."
 GER_light_tank_equipment_5: "Kanonenjagdpanzer"
 GER_light_tank_equipment_5_short: "Kanonenjagdpanzer"
