 expanded_fuel_tank: "外部燃油桶"
 expanded_fuel_tank_desc: "一种安装在外部的燃油桶，用于增加装甲车辆的工作范围。"
 tank_designer_wheeled_tank_chassis: "轮式坦克"
 tank_gasoline_engine: "汽油引擎"
 tank_gasoline_engine_desc: "在相同发动机尺寸下,使用汽油的发动机会跑得更快,但更容易着火"
 tank_diesel_engine: "柴油引擎"
 tank_diesel_engine_desc: "使用柴油的发动机比汽油发动机更可靠,但在相同的发动机尺寸下,速度会不如汽油发动机"
 tank_petrol_electric_engine: "燃油-电力引擎"
 tank_petrol_electric_engine_desc: "使用汽油驱动电动马达的发动机组合。它复杂、昂贵且不可靠，然而它在战术行军方面有着无与伦比的优越性。"
 tank_gas_turbine_engine: "燃气涡轮发动机"
 tank_gas_turbine_engine_desc: "由喷气式飞机发动机衍生而来的坦克发动机。高燃料消耗，但在相同的发动机尺寸下，能提供最高的速度。"
 tank_riveted_armor: "铆接装甲"
 tank_riveted_armor_desc: "装甲板通过螺栓固定在框架上，铆钉则用于连接装甲板的边缘。 虽然这种技术成熟且经济，但铆接处会降低装甲的整体强度，且一旦铆钉受到攻击，飞溅的碎片可能会危及乘员安全。"
 tank_cast_armor: "铸造装甲"
 tank_cast_armor_desc: "底盘和装甲采用整体铸造技术，浑然一体。 这种工艺昂贵且耗时，但能够制造出防护性能更佳、弱点更少的装甲结构。"
 tank_welded_armor: "焊接装甲"
 tank_welded_armor_desc: "装甲板被焊接到底盘上。工艺时间上比铸造更快，同时仍能提供良好的保护。"
 tank_torsion_bar_suspension: "扭力杆"
 tank_torsion_bar_suspension_desc: "由固定在车辆底盘上的金属杆组成的相当可靠的悬挂系统，提供比其他悬挂更平稳的行驶体验。"
 tank_christie_suspension: "克里斯蒂悬挂"
 tank_christie_suspension_desc: "由一位美国发明家开发，这种悬挂可以到达极高的速度。"
 tank_bogie_suspension: "台车式悬挂"
 tank_bogie_suspension_desc: "一种简单而相当廉价的悬架，其中的车轮是单独安装的，如果损坏，可以很容易地更换。"
 tank_interleaved_suspension: "交错负重轮"
 tank_interleaved_suspension_desc: "通过将负重轮交错排列，同样的车体长度能够安装更多的负重轮，从而提高机动性，并提额外的车身侧面防护。"
 tank_light_one_man_tank_turret: "单乘员炮塔"
 tank_light_one_man_tank_turret_desc: "这座小型炮塔勉强能塞下一名坦克乘员。这名乘员同时负责主武器的瞄准和装填，还要随时关注周围的环境和威胁。"
 tank_light_two_man_tank_turret: "双乘员炮塔"
 tank_light_two_man_tank_turret_desc: "这座炮塔内部能容纳两名乘员，允许他们在操作武器和观察战场方面分工合作。然而如此的分工的效率不高。"
 tank_light_three_man_tank_turret: "三乘员炮塔"
 tank_light_three_man_tank_turret_desc: "这座大型炮塔能容纳三名乘员，他们可以分别负责主武器的瞄准、装填，以及观察周边环境。"
 tank_light_fixed_superstructure_turret: "轻型固定式炮塔"
 tank_light_fixed_superstructure_turret_desc: "采用固定式炮塔意味着主武器的射角极为受限，只能借由整车的旋转带动主武器旋转。然而，这种设计允许在同样尺寸的车身上安装更大的武器，使得该载具成为伏击作战的理想选择。"
 tank_medium_one_man_tank_turret: "单乘员炮塔"
 tank_medium_one_man_tank_turret_desc: "这座小型炮塔勉强能塞下一名坦克乘员。这名乘员同时负责主武器的瞄准和装填，还要随时关注周围的环境和威胁。"
 tank_medium_two_man_tank_turret: "双乘员炮塔"
 tank_medium_two_man_tank_turret_desc: "这座炮塔内部能容纳两名乘员，允许他们在操作武器和观察战场方面分工合作。然而如此的分工的效率不高。"
 tank_medium_three_man_tank_turret: "三乘员炮塔"
 tank_medium_three_man_tank_turret_desc: "这座大型炮塔能容纳三名乘员，他们可以分别负责主武器的瞄准、装填，以及观察周边环境。"
 tank_medium_fixed_superstructure_turret: "中型固定式炮塔"
 tank_medium_fixed_superstructure_turret_desc: "采用固定式炮塔意味着主武器的射角极为受限，只能借由整车的旋转带动主武器旋转。然而，这种设计允许在同样尺寸的车身上安装更大的武器，使得该载具成为伏击作战的理想选择。"
 tank_heavy_two_man_tank_turret: "双乘员炮塔"
 tank_heavy_two_man_tank_turret_desc: "这座炮塔内部能容纳两名乘员，允许他们在操作武器和观察战场方面分工合作。然而如此的分工的效率不高。"
 tank_heavy_three_man_tank_turret: "三乘员炮塔"
 tank_heavy_three_man_tank_turret_desc: "这座大型炮塔能容纳三名乘员，他们可以分别负责主武器的瞄准、装填，以及观察周边环境。"
 tank_heavy_fixed_superstructure_turret: "重型固定式炮塔"
 tank_heavy_fixed_superstructure_turret_desc: "采用固定式炮塔意味着主武器的射角极为受限，只能借由整车的旋转带动主武器旋转。然而，这种设计允许在同样尺寸的车身上安装更大的武器，使得该载具成为伏击作战的理想选择。"
 tank_super_heavy_four_man_tank_turret: "四乘员炮塔"
 tank_super_heavy_four_man_tank_turret_desc: "这座巨大的炮塔能容纳一名额外的装填手为主武器装填。"
 tank_super_heavy_three_man_tank_turret: "三乘员炮塔"
 tank_super_heavy_three_man_tank_turret_desc: "这座大型炮塔能容纳三名乘员，他们可以分别负责主武器的瞄准、装填，以及观察周边环境。"
 tank_modern_tank_turret: "现代炮塔"
 tank_modern_tank_turret_desc: "这座精心布局的炮塔允许三名乘员在高效地操作主武器的同时保持对周边环境的良好感知。"
 tank_radio_1: "基础型无线电"
 tank_radio_1_desc: "一座基础的无线电收发设备可以让坦克在较小的规模内协调其战术机动。"
 tank_radio_2: "改进型无线电"
 tank_radio_2_desc: "一座改良无线电设备允许指挥官们有效地指挥更大的坦克编队，从而实现大规模的作战机动。"
 tank_radio_3: "先进型无线电"
 tank_radio_3_desc: "装有一台大功率发射器和更好的接收器，这座无线电即使面对敌军的干扰也能保持数十千米的通讯范围。"
 amphibious_drive: "两栖驱动"
 amphibious_drive_desc: "包含一组漂浮装置和一个小螺旋桨，其将帮助坦克快速穿越水面，无论是从登陆舰驶向岸边还是跨过河流。"
 secondary_turret_hmg: "重机枪"
 secondary_turret_hmg_desc: "放置于副炮塔之中的重机枪。炮塔的位置限制了它的射界，降低了其的整体效能，但它确实使得坦克可以攻击更多的目标，这在进攻的时候将会有些作用。"
 secondary_turret_small_cannon: "小型加农炮"
 secondary_turret_small_cannon_desc: "放置于副炮塔之中的小型加农炮。炮塔的位置限制了它的射界，降低了其整体效能，但它确实使得坦克可以攻击更多的目标，这在进攻的时候将会有些作用。"
 secondary_turret_close_support_gun: "近距支援炮"
 secondary_turret_close_support_gun_desc: "放置于副炮塔之中的近距离支援炮。炮塔的位置限制了它的射界，降低了其的整体效能，但它确实使得坦克可以攻击更多的目标，这在进攻的时候将会有些作用。"
 sloped_armor: "倾斜装甲"
 sloped_armor_desc: "与来袭炮弹成一定角度的装甲和垂直的装甲相比较，其有效装甲厚度更高。倾斜的装甲还有更高的几率回弹炮弹。然而如此一来，整辆坦克都需要围绕着倾斜装甲设计，导致整车组装难度更大。"
 stabilizer: "火炮稳定器"
 stabilizer_desc: "一种在坦克移动时保持火炮指向同一方向的机械装置。虽然不够先进，无法达成在移动中的准确射击，但它可以让炮手在坦克短暂的停留期间准确射击，而无需重新寻找目标。"
 smoke_launchers: "烟雾发射器"
 smoke_launchers_desc: "一组烟火发射装置，可以从坦克内部启动，能产生浓烟以隐藏坦克。在防御战中或在遭受伏击时极为有用。"
 extra_ammo_storage: "额外弹药架"
 extra_ammo_storage_desc: "额外的弹药架可以允许坦克在没有进行补给的情况下作战更长时间。但是，一旦保护额外弹药架的装甲被击穿，其结果将是灾难性的，在进攻的时候这个问题将更加显著。"
 wet_ammo_storage: "湿式弹药架"
 wet_ammo_storage_desc: "在弹药架上加装的水套，大大降低了坦克装甲被击穿后弹药爆炸的风险，这一设计受到了坦克乘员们的高度好评。"
 com_night_vision: "车长夜视仪"
 com_night_vision_desc: "该装置配备红外聚光灯和瞄准境，这套装备能够确保指挥官即使在黑暗的夜晚也能获得清晰的视野。"
 early_modern_radio: "早期现代无线电"
 early_modern_radio_desc: "凭借多频道支持能力，该电台允许坦克在多个独立的通信频道上与其他单位保持联络。"
 modern_radio: "现代无线电"
 modern_radio_desc: "本通信系统采用子带编码技术，将操作员的声音分散到多个频率上传输，从而实现了极高的安全性，并显著增加了被破解的难度。"
 long_range_radio: "长距离无线电"
 long_range_radio_desc: "二战时期最强大的坦克电台功率为50瓦，但在10公里以外往往就没用了。然而，20世纪70年代最强大的坦克无线电设备可以轻松地与50多公里以外的地方通信。这种技术，再加上脉冲编码调制加密技术，使得整个坦克营之间的通信近乎完美。"
 tank_composite_armor: "复合装甲"
 tank_composite_armor_desc: "通过采用夹层结构，将玻璃、硅或其它材料置于两层钢板之间，使得这种装甲板相比同等厚度的均质钢板，具备更优异的抗冲击性能。 但同时，生产所需的工时和材料成本也相应增加。"
 tank_spaced_armor: "间隔装甲"
 tank_spaced_armor_desc: "与复合装甲相比，间隔装甲在阻挡动能弹的效能上有所不及，但仅依靠在两层装甲板之间留出空隙，就能够有效防御聚能装药弹的攻击，且制造成本通常更为经济。"
 reactive_plate: "爆炸反应装甲"
 reactive_plate_desc: "反应装甲通过引爆夹在两块金属板之间的少量炸药，来干扰聚能装药弹的穿甲过程。 通过精确控制爆炸时机，在聚能装药弹起爆的瞬间做出反应，即使是轻型的反应装甲也能有效地对抗重型爆炸成型穿甲弹。"
 early_gps: "早期GPS"
 early_gps_desc: "全球定位系统 (GPS)。 即使这项技术的早期版本存在精度不高、可靠性不佳等问题，它依然能够让坦克成员在100米的范围内确定自身所处的位置，而这已经带来了巨大的战术价值。"
 modern_gps: "现代GPS"
 modern_gps_desc: "结合更先进的卫星、数字显示器和可靠的信号接收器，这套GPS套件意味着再也不会有坦克迷失方向。"
 adv_dozer_blade: "高级推土铲"
 adv_dozer_blade_desc: "该铲刀采用更大功率的电机，配合强化型提升臂和脊状刀头，即使在相对坚硬的土壤条件下，也能有效进行挖掘作业。"
 modern_dozer_blade: "尽管在机械结构上与之前的型号没有太大区别，但这款铲刀在收起状态下体积更小，并且采用了复合合金材料，使其能够挖掘除坚固岩石以外的几乎所有土壤，用于构筑防御工事。"
 adv_optics: "先进光学传感器"
 adv_optics_desc: "最早的坦克光学设备实际上是在车体上切割出的孔洞或缝隙，供乘员向外观察。 这种做法非常危险，因为弹片和破片可能进入，造成通常是致命的伤害。 虽然观察窗和潜望镜在一定程度上有所改进，但这些设备的清晰度仍然不高。 然而，随着制造工艺的不断完善，新型观察设备得以开发，从而能够提供前所未有的可见性和乘员态势感知能力。"
 em_optics: "早期现代光学传感器"
 em_optics_desc: "通过使用多层防刮玻璃，视野清晰。结合旋转支架，机组人员能够充分了解周围环境。"
 modern_optics: "现代光学传感器"
 modern_optics_desc: "随着夜视技术的发展，出现了一种特殊的潜望镜，它可以与普通潜望镜互换使用，并且专门设计用于在红外波段进行观察。结合层压硅玻璃的使用，使坦克乘员得以观察到以往无法察觉的事物。"
 wp_smoke: "白磷烟雾"
 wp_smoke_desc: "白磷，别名威利·皮特是一种极具危险性的燃烧剂，接触皮肤会造成严重烧伤，同时还会产生大量烟雾。"
 cutting_corner: "偷工减料"
 cutting_corner_desc: "通过使用更廉价的钢材，简化浇铸工艺，并且省去热处理或叠层等步骤，我们能显著降低车辆的建造时间和成本。 但是，这样做会导致车辆的故障频率大大增加，长期来看可能并不划算。"
 lean_fuel: "稀薄燃料混合物"
 lean_fuel_desc: "内燃机是依靠氧气和燃料的混合燃烧来产生动力，通常使用的燃料是汽油或者柴油。 通过降低每次点火所需的燃料，并且人为添加乙醇之类的添加剂，我们可以降低车辆的燃油消耗。 然而，这也可能导致发动机更容易出现故障 —— 让人意想不到的是，相比于使用浓混合气的发动机，使用稀薄混合气的发动机反而会运行在更高的温度下。"
 fair_repair: "合理维修"
 adv_auto_loader: "先进自动装弹机"
 adv_auto_loader_desc: "早期自动装弹机受限于其固有的不可靠性，并且需要每隔四五发弹药就进行一次重新装填，因而实用性大打折扣。同时，这些早期的自动装弹机往往还需要人工干预才能完成装填。而这款型号则实现了真正的全自动装填，弹容量至少7发，并且在可靠性方面有了显著提高。"
 earlt_modern_auto_loader: "早期现代自动装弹机"
 earlt_modern_auto_loader_desc: "以往的自动装弹机倾向于采用弹鼓设计——即将7到10发弹药置于一个位于炮尾下方的旋转弹鼓中。这种设计结构简单、体积小巧且装填速度快，但缺点是弹鼓只能容纳一种类型的弹药，并且需要手动装填其他类型的弹药。相比之下，这款自动装弹机更具适应性，可以通过自动装弹机装填多种不同类型的弹药。虽然尚未先进到完全取消装填手的必要，但该系统大大减轻了人工装填手的疲劳。"
 modern_auto_loader: "现代自动装弹机"
 modern_auto_loader_desc: "这是一种可靠性极高的自动装弹系统，能够完全取代人工装填手，并在较长时间内提供稳定的射速。 凭借20发以上的弹药容量，以及无需任何人工干预即可完成装填的能力，这套造价高昂的系统对于进攻中的坦克而言是绝佳之选。"
 advanced_reactive_plate: "先进爆炸反应装甲"
 advanced_reactive_plate_desc: "由于采用了更高效的爆炸混合物，并缩短了激活到引爆的延迟时间，这款反应装甲板甚至能够有效抵御高初速脱壳穿甲弹的攻击。"
 advanced_tank_composite_armor: "先进复合装甲"
 advanced_tank_composite_armor_desc: "最初的复合装甲仅由寥寥数层材料构成，常见的组合方式是钢-玻璃-钢等。 这款复合装甲则采用多层复合材料，并以钢板进行加固，虽然成本高昂，但可以提供针对各种类型弹药的出色防护能力。"
 hard_kill_system: "主动防御系统"
 hard_kill_system_desc: "主动防御系统通过主动发射拦截弹，在空中摧毁来袭的弹药，包括导弹甚至炮弹。 依靠高速计算机和传感器，系统能够迅速反应，在数毫秒内利用一块小型金属板摧毁来袭威胁。"
 apfsds: "尾翼稳定脱壳穿甲弹"
 apfsds_desc: "尾翼稳定脱壳穿甲弹（简称APFSDS）是一种高速穿甲弹，几乎可以击穿任何装甲目标。 由于速度极高，这种炮弹不会产生跳弹现象，而是在大角度撞击时直接粉碎。"
 atgm: "反坦克导弹发射器"
 atgm_desc: "反坦克导弹发射器（ATGM 发射器）使用有线或无线制导系统，引导装有聚能装药战斗部的导弹攻击目标，这些目标通常是坦克。"
 heat_fs: "尾翼稳定破甲弹"
 heat_fs_desc: "尾翼稳定破甲弹 (HEAT-FS) 是早期破甲弹的改进型。 它采用凹面锥形装药，内衬铜材料的聚能装药能够穿透厚重装甲。 然而，当炮弹旋转时（例如从线膛炮发射时），铜制射流会发生扩散，导致穿甲性能大幅下降。 稳定尾翼可以抵消这种旋转，使聚能射流能够穿透近半米的钢制装甲。"
