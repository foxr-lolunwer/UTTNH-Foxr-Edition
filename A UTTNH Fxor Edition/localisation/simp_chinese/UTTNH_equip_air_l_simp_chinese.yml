 SOV_jet_fighter_equipment_6_short: "米格-23"
 SOV_jet_fighter_equipment_6_desc: "米高扬-格列维奇 米格-23（北约代号：鞭挞者）是一种可变后掠角战斗机，由苏联米高扬-格列维奇设计局设计。它是第三代喷气式战斗机，是世界上产量最多的可变后掠翼飞机，与苏-15 “鱼嘴瓶”等苏联战斗机一样。它是第一架配备俯视/击落雷达的苏联战斗机，也是首批配备超视距导弹的战斗机之一。"
