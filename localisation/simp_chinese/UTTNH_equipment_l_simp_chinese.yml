 infantry_equipment_4: "突击步枪 I"
 infantry_equipment_4_short: "突击步枪 I"
 infantry_equipment_4_desc: "突击步枪，一种可选择射击模式、发射中间威力弹药的步枪。既能提供持续火力，也能确保500米以上的精确射击能力。尽管突击步枪的体积大于早期型号，但其性能全面超越了同时代最优秀的栓动步枪和半自动步枪。因此，除机枪和手枪外，它取代了绝大多数其他现役轻武器。"
 infantry_equipment_5: "突击步枪 II"
 infantry_equipment_5_short: "突击步枪 II"
 infantry_equipment_5_desc: "纵使时代变迁，在任何军队中，一名普通的步枪兵依然是最重要的组成部分。因此，采用合成材料、中间威力枪弹和特种塑料等技术进行现代化的突击步枪，能使单兵火力达到三十名栓动步枪手的水平。"
 infantry_equipment_6: "突击步枪 III"
 infantry_equipment_6_short: "突击步枪 III"
 infantry_equipment_6_desc: "人体工程学与新材料技术的突破，新一代突击步枪在重量与体积上得以进一步优化。得益于可扩展的模块化导轨系统，能够灵活加装握把、瞄准镜等战术配件，堪称划时代的“太空时代”枪械。"
 infantry_equipment_7: "突击步枪 IV"
 infantry_equipment_7_short: "突击步枪 IV"
 infantry_equipment_7_desc: "在早期，卡宾枪是指骑兵使用的短管步枪。无烟火药的应用曾一度使卡宾枪的地位大幅下降，仅有少数型号得以保留。但近几十年来，卡宾枪又重焕生机。相较于传统的突击步枪，新式“突击卡宾枪”的弹药口径有所缩小，但在便携性与城市战环境适应性方面优势显著，成为了战场上一种不可忽视的火力补充。"
 infantry_equipment_8: "突击步枪 V"
 infantry_equipment_8_short: "突击步枪 V"
 infantry_equipment_8_desc: "伴随着无壳弹药、无托结构和电子系统的应用，突击步枪至今仍在不断进化。现代突击步枪追求轻量化设计，发射中间威力弹药，具备全自动、点射和半自动射击能力，采用便捷的弹匣供弹，并能根据需求加装各种附件。"
