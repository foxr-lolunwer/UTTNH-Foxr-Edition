 GER_infantry_equipment_2: "MP 40冲锋枪"
 GER_infantry_equipment_2_short: "MP 40冲锋枪"
 GER_infantry_equipment_2_desc: "1938年，德国枪械设计师海因里希·沃尔默在借鉴早期MP 38冲锋枪的设计基础上，完成了该武器的设计。 它被广泛配发给东线和西线的步兵，尤其是各步兵排和班的指挥官，以及伞兵部队。 由于其在当时非常先进的设计理念和技术特点，该枪深受士兵们的青睐。 二战结束后， 它还在世界各地的多个国家获得了极高的人气。"
