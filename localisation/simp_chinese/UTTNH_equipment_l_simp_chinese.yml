 motorized_equipment_0: "早期卡车"
 motorized_equipment_1: "通用 CCKW 卡车"
 motorized_equipment_2: "M54卡车"
 motorized_equipment_2_desc: "为适应我军机械化、装甲化部队日益提升的机动能力，必须确保摩托化部队的同步发展。采用新型发动机和创新型五速变速箱的现代军用卡车，足以伴随高速行驶的坦克一同推进。"
 motorized_equipment_3: "M55卡车"
 motorized_equipment_3_desc: "随着增压器的普及，重型货运卡车即使采用普通柴油发动机，也能获得媲美高性能发动机的动力输出，从而轻松胜任高速公路运输任务。"
 motorized_equipment_4: "1980 卡车"
 motorized_equipment_5: "1980 卡车"
 motorized_equipment_4_desc: "现代卡车不仅要拥有出色的公路性能，更要具备全地形适应能力。全轮驱动系统、多级变速器以及大功率涡轮增压发动机的协同作用，使得车辆的越野速度相较以往大幅提升。"
 motorized_equipment_6: "1990 卡车"
 motorized_equipment_6_desc: "通过使用燃油喷射和涡轮增压器，以及电子控制单元，未来的车辆速度甚至将超过上一代最快的卡车。"
