 drop_tanks: "可抛弃式副油箱 I"
 drop_tanks_desc: "携带额外燃料的可丢弃小型油箱在进攻性任务中为我们的战斗机提供了额外航程。由于战斗前会丢弃这些油箱，战斗性能不会受到影响。"
 drop_tanks1: "可抛弃式副油箱 II"
 drop_tanks1_desc: ""
 drop_tanks2: "可抛弃式副油箱 III"
 drop_tanks2_desc: ""
 dive_brakes_small: "俯冲减速板"
 dive_brakes_small_desc: "机翼后缘的一组扰流板可在飞机俯冲时展开，不仅能够降低俯冲速度，也能使飞机在完好的前提下从大角度俯冲中脱离。这反过来又允许飞机从近乎垂直的角度进行俯冲攻击，大大提高了攻击的准确度。"
