 mechanized_equipment_8_short: "Бронетранспортёр VIII"
 mechanized_equipment_8_desc: "Механизированная пехота оснащена бронетранспортерами или боевыми машинами. От моторизированной она отличается тем, что ее техника обеспечивает определенную защиту от вражеского огня, в то время как моторизированные подразделения обычно снабжаются небронированными машинами — джипами и грузовиками."
 
 motorized_rocket_equipment: "Моторизированная реактивная артиллерия"
 motorized_rocket_equipment_short: "Мотор. реакт. артилерия"
 motorized_rocket_equipment_desc: "Реактивные установки доставляют снаряды к цели быстрее, чем это способна сделать традиционная артиллерия, но менее точны и гораздо дольше заряжаются. При установке на грузовик способны поменять позицию после выстрела быстрее, чем противник сможет отреагировать."
 motorized_rocket_equipment_1: "Моторизированная реактивная артиллерия"
 motorized_rocket_equipment_1_short: "Мотор. реакт. артилерия"
 motorized_rocket_equipment_1_desc: "Реактивные установки доставляют снаряды к цели быстрее, чем это способна сделать традиционная артиллерия, но менее точны и гораздо дольше заряжаются. При установке на грузовик способны поменять позицию после выстрела быстрее, чем противник сможет отреагировать."
 
 gw_armored_car_equipment: "Бронемашина межвоенного периода"
 gw_armored_car_equipment_desc: "Предыдущие бронемашины были обычными автомобилями с дополнительной тонкой обшивкой; эта же модель изначально спроектирована с учётом брони и лёгкого вооружения."
 armored_car_equipment_1: "Бронемашина I"
 armored_car_equipment_1_desc: "Улучшенный салон и дополнительное хранилище для боезапаса повышают боевую эффективность машины."
 armored_car_equipment_2: "Бронемашина II"
 armored_car_equipment_2_desc: "Чтобы бронемашины могли не только подбить лёгкую технику противника, но и вернуться назад, требуется приспособить их к изменениям на поле боя и снабдить более мощным вооружением и прочной броней."
 armored_car_at_equipment: "Противотанковая бронемашина"
 armored_car_at_equipment_desc: "Рано или поздно наши лёгкие механизированные части столкнутся с танками противника. Разработав специальной противотанковый вариант бронемашины, мы обеспечим себе шанс на победу."
 armored_car_equipment_3: "Бронемашина III"
 armored_car_equipment_3_desc: "Рано или поздно наши лёгкие механизированные части столкнутся с танками противника. Разработав специальной противотанковый вариант бронемашины, мы обеспечим себе шанс на победу."
 armored_car_equipment_4: "Бронемашина IV"
 armored_car_equipment_4_desc: "Рано или поздно наши лёгкие механизированные части столкнутся с танками противника. Разработав специальной противотанковый вариант бронемашины, мы обеспечим себе шанс на победу."
