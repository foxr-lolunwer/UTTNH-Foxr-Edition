 ####МОДУЛИ
 ##Двигатель
 helicopter_jet_engine_1x: "1 x двигатель вертолёта I"
 helicopter_jet_engine_1x_short: "1 x двигатель вертолёта I"
 helicopter_jet_engine_1x_desc: "Модифицированный двигатель ранних реактивных самолётов с простым выходным валом."
 helicopter_jet_engine_2x: "2 x двигатель вертолёта I"
 helicopter_jet_engine_2x_short: "2 x двигатель вертолёта I"
 helicopter_jet_engine_2x_desc: "Пара модифицированных реактивных двигателей с простым выходным валом."
 helicopter_jet_engine_1x_1: "1 x двигатель вертолёта II"
 helicopter_jet_engine_1x_1_short: "1 x двигатель вертолёта II"
 helicopter_jet_engine_1x_1_desc: "Турбовальный двигатель, разработанный с нуля специально для использования на вертолётах."
 helicopter_jet_engine_2x_1: "2 x двигатель вертолёта II"
 helicopter_jet_engine_2x_1_short: "2 x двигатель вертолёта II"
 helicopter_jet_engine_2x_1_desc: "Пара турбовальных двигателей, специально разработанных для вертолёта."
 helicopter_jet_engine_1x_2: "1 x двигатель вертолёта III"
 helicopter_jet_engine_1x_2_short: "1 x двигатель вертолёта III"
 helicopter_jet_engine_1x_2_desc: "Улучшенный турбовальный двигатель со свободной турбиной. Улучшенные фильтры и новая форма камеры сгорания обеспечивают большую мощность."
 helicopter_jet_engine_2x_2: "2 x двигатель вертолёта III"
 helicopter_jet_engine_2x_2_short: "2 x двигатель вертолёта III"
 helicopter_jet_engine_2x_2_desc: "Пара улучшенных турбовальных двигателей с повышенной мощностью."
 helicopter_jet_engine_1x_3: "1 x двигатель вертолёта IV"
 helicopter_jet_engine_1x_3_short: "1 x двигатель вертолёта IV"
 helicopter_jet_engine_1x_3_desc: "Современный высокоэффективный турбовальный двигатель со свободной турбиной, осевым компрессором с изменяемой геометрией и повышенной устойчивостью к пыли, грязи и другим загрязнениям."
 helicopter_jet_engine_2x_3: "2 x двигатель вертолёта IV"
 helicopter_jet_engine_2x_3_short: "2 x двигатель вертолёта IV"
 helicopter_jet_engine_2x_3_desc: "Пара современных мощных турбовальных двигателей с осевыми компрессорами с изменяемой геометрией и эффективными фильтрами, позволяющими работать в запыленных районах."
 
 ##Несущий винт
 helicopter_rotor_2x: "Двухлопастной несущий винт"
 helicopter_rotor_2x_desc: "Легкий и эффективный несущий винт с двумя лопастями, разработанный для небольших вертолётов"
 helicopter_rotor_4x: "Четырёхлопастной несущий винт"
 helicopter_rotor_4x_desc: "Тяжелый и мощный четырехлопастный несущий винт, способный поднять более тяжелый вертолёт."
 helicopter_rotor_2_4x: "2 x четырёхлопастной несущий винт"
 helicopter_rotor_2_4x_desc: "Пара сверхмощных четырехлопастных винтов, предназначенных для подъема огромного веса."
 
 ##Вооружение
 helicopter_saam: "Ракета «Воздух-воздух»"
 helicopter_saam_desc: "Ракета класса "воздух-воздух" малой дальности, обеспечивающая защиту от авиации противника."
 
 helicopter_cannon_1: "Пушка I"
 helicopter_cannon_1_short: "Пушка I"
 helicopter_cannon_1_desc: "Небольшая пушка, наводимая наводчиком вручную."
 helicopter_cannon_2: "Пушка II"
 helicopter_cannon_2_short: "Пушка II"
 helicopter_cannon_2_desc: "Усовершенствованная пушка в установке со стабилизатором."
 helicopter_cannon_3: "Пушка III"
 helicopter_cannon_3_short: "Пушка III"
 helicopter_cannon_3_desc: "Усовершенствованная автопушка с электронным наведением через дисплей."
 
 helicopter_bomb: "Авиабомба"
 helicopter_bomb_short: "Авиабомба"
 helicopter_bomb_desc: "Авиабомба, закреплённая либо на точке подвеса, либо в небольшом бомбовом отсеке."
 
 helicopter_atgm_1_1x: "1 x ракета «Воздух-поверхность» I"
 helicopter_atgm_1_1x_short: "1 x УРВП I"
 helicopter_atgm_1_1x_desc: "Простая противотанковая ракета, наводимая на цель с помощью кабеля."
 helicopter_atgm_1_2x: "2 x ракета «Воздух-поверхность» I"
 helicopter_atgm_1_2x_short: "2 x УРВП I"
 helicopter_atgm_1_2x_desc: "Пара простых противотанковых ракет, наводимых на цель с помощью кабеля."
 helicopter_atgm_2_2x: "2 x ракета «Воздух-поверхность» II"
 helicopter_atgm_2_2x_short: "2 x УРВП II"
 helicopter_atgm_2_2x_desc: "Пара противотанковых ракет, наводимых на цель по радиоканалу. Усовершенствованный дизайн крыльев способствует лучшей стабильности в полёте."
 helicopter_atgm_2_4x: "4 x ракета «Воздух-поверхность» II"
 helicopter_atgm_2_4x_short: "4 x УРВП II"
 helicopter_atgm_2_4x_desc: "Четыре противотанковых ракеты, наводимых на цель по радиоканалу. Усовершенствованный дизайн крыльев способствует лучшей стабильности в полёте."
 helicopter_atgm_3_2x: "2 x ракета «Воздух-поверхность» III"
 helicopter_atgm_3_2x_short: "2 x УРВП III"
 helicopter_atgm_3_2x_desc: "Пара усовершенствованных ПТУР с автоматическим электронным наведением. Боеголовки с тандемным зарядом поражают современную динамическую защиту."
 helicopter_atgm_3_4x: "4 x ракета «Воздух-поверхность» III"
 helicopter_atgm_3_4x_short: "4 x УРВП III"
 helicopter_atgm_3_4x_desc: "Четыре усовершенствованных ПТУР с автоматическим электронным наведением. Боеголовки с тандемным зарядом поражают современную динамическую защиту."
 
 helicopter_airdropped_mines: "Авиационная система минирования"
 helicopter_airdropped_mines_desc: "Авиационная система минирования - вооружение вертолета, предназначенное для обеспечения сбрасывания в нужной последовательности авиационных морских мин. Состоит из минных кассет и аппаратуры управления их установкой."
 side_turret: "Дополнительные пушечные контейнеры"
 side_turret_desc: "Пушка, установленная в подвесном контейнере, для ближней огневой поддержки и обороны."
 helicopter_rocket_pod: "Неуправляемые авиационные ракеты"
 helicopter_rocket_pod_short: "НАР"
 helicopter_rocket_pod_desc: "Неуправляемая авиационная ракета — вид авиационных средств поражения. После пуска ракета совершает неуправляемый полёт. По сравнению с пушечным вооружением НАР имеют бо́льшую прицельную дальность, но всё же имеют слишком большое рассеивание на большой дальности полёта."
 helicopter_torpedo_mounting: "Торпеда"
 helicopter_torpedo_mounting_short: "Торпеда"
 helicopter_torpedo_mounting_desc: "Малогабаритная бесследная электрическая самонаводящаяся торпеда для поражения надводных кораблей и подводных лодок."

 ##Электроника
 helicopter_rwr: "Система предупреждения об облучении"
 helicopter_rwr_short: "СПО"
 helicopter_rwr_desc: "Бортовое радиоэлектронное оборудование, предназначенное для автоматического обнаружения излучения посторонней РЛС и предупреждения об этом экипажа."
 helicopter_night_vision: "Прибор ночного видения"
 helicopter_night_vision_desc: "Комплект ночного видения ближнего инфракрасного диапазона позволяет самолету оставаться боеспособным в ночных операциях."
 helicopter_thermal_vision: "Тепловизор"
 helicopter_thermal_vision_desc: "Инфракрасный тепловизионный комплекс позволяет вертолёту оставаться боеспособным в ночных операциях, а также помогает наводить цели в любых условиях."
 radar_ball: "Радарный купол"
 radar_ball_desc: "Радиолокационная подсистема, представляющая собой радиолокационную систему обнаружения целей с управлением огнём на миллиметровых волнах и радиолокационный частотный интерферометр, которые размещены в куполе, расположенном над несущим винтом"
 helicopter_flare: "Тепловые ловушки"
 helicopter_flare_desc: "Ложные тепловые цели — пиротехнические устройства, выделяющие большое количество тепла при сгорании горючего состава, также известны как «тепловые ловушки» и «ИК-ловушки». Конструктивно представляют собой небольшую ёмкость с твердым горючим составом (пирофорным или пиротехническим) — конструкция в принципе подобна звёздам сигнальных или осветительных ракет."
 
 ##Прочее
 helicopter_armor_plate_small: "Бронирование корпуса"
 helicopter_armor_plate_small_desc: "Стальные пластины в особо уязвимых местах могут выдержать огонь из стрелкового оружия."
 helicopter_demining_coil: "Траловое устройство"
 helicopter_demining_coil_desc: "Большая магнитная катушка, установленная в грузовом отсеке, безопасно подрывает мины на расстоянии."
 
