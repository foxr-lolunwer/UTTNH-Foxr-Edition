 GER_light_tank_equipment_7: "Wiesel AWC"
 GER_light_tank_equipment_7_short: "Wiesel AWC"
 GER_light_tank_equipment_7_desc: "Легкие танки — маленькие и подвижные. Они подходят для разведки и боя с легкобронированными противниками."
