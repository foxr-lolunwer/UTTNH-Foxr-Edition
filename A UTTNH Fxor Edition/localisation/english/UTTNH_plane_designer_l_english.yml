 medium_bomb_bay_3: "TV Guided Bomb Bay" 
 medium_bomb_bay_3_desc: "A mid-sized bomb bay carrying early, TV guided bombs."
 medium_bomb_bay_4: "Laser Guided Bomb Bay" 
 medium_bomb_bay_3_desc: "A mid-sized bomb bay carrying early, laser guided bombs."
