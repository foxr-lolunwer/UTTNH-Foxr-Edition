 GER_mechanized_equipment_1_short: "Sonderkraftfahrzeug 250"
 GER_mechanized_equipment_1_desc: "Sd. Kfz. 11 (Sonderkraftfahrzeug— «специальное моторизированное транспортное средство»)— немецкий полугусеничный транспортер, который широко применялся во время Второй мировой войны. Мог перевозить восемь пехотинцев, буксируя при этом орудие или прицеп."
 GER_mechanized_equipment_2: "Sonderkraftfahrzeug 251"
 GER_mechanized_equipment_2_short: "Sd.Kfz. 251"
 GER_mechanized_equipment_2_desc: "Sd.Kfz. 251— полугусеничный бронетранспортер, разработанный и производившийся компанией «Ганомаг» во время Второй мировой войны, конструктивно основанный на более раннем образце Sd.Kfz. 11."
