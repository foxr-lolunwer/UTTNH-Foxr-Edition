l_simp_chinese:
 remove_shackles: "移除限制"
 remove_shackles_desc: "为了让游戏在20世纪60年代之前都可以玩，小型国家部署大量部队和生产大量装备的能力受到了限制。如果你想游玩受到限制的小型国家，这个决议将会移除限制。"
 shackles.1.t: "AI限制"
 shackles.1.d: "HoI4 游戏后期因其速度缓慢而臭名昭著。这是由于 AI 国家制造了大量的军事装备并训练了庞大的军队，甚至是那些小国。这是20世纪40年代末的一个问题，进入50年代和60年代更是如此，这对游戏性能产生了重大影响。 AI Shackles 模组对这些小国添加了生产和招募限制，以确保游戏的可玩性。一些国家，如巴西和阿根廷，拥有合理的工业，但不太关心国外冲突（直至--以巴西为例，他们被拖进了战争），模组只会对可招募的人力进行限制，而其他国家（像萨尔瓦多），人力和工业都将受到限制。\n\n如果你决定对 AI 施加这些限制，也可以说是枷锁，同时想游玩小国，可以通过决议将其删除（成本 1pp）。或者，您可以从一开始就在没有它们的情况下游玩所有国家/地区，但这肯定会对游戏性能产生不利影响。这是你的选择。\n\n我邀请您查看 Steam 上的 Extended Tech Tree 1960 模组，以便在正常结束日期之后继续游玩新内容。"
 shackles.1.b: "我不想限制AI"
 shackles.1.b.d: "小型国家将不会被限制"
 shackles.1.a: "还是限制吧"
 shackles.1.a.d: "小型国家将被限制"
 unindustrialized: "未工业化"
 uninterested: "完全禁止征兵"