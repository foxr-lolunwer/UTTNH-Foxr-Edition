 GER_modern_tank_equipment_1: "E-75 Standardpanzer"
 GER_modern_tank_equipment_1_short: "E-75"
 GER_modern_tank_equipment_1_desc: "The Entwicklung series was a late-War attempt by Germany to produce a standardized series of tank designs. There were to be standard designs in six different weight classes. The E-75 Standardpanzer was intended as a standard medium tank, replacing the Panther and Tiger tank series and the conversions based on those tanks."
 GER_modern_tank_equipment_2: "E-90"
 GER_modern_tank_equipment_2_short: "E-90"
 GER_modern_tank_equipment_3: "Leopard 1"
 GER_modern_tank_equipment_3_short: "Leopard 1"
 GER_modern_tank_equipment_3_desc: "The Leopard is a main battle tank designed and produced by Porsche in West Germany that first entered service in 1965. Developed in an era when HEAT warheads were thought to make conventional heavy armour of limited value, the Leopard focused on firepower in the form of the German-built version of the British L7 105-mm gun, and improved cross-country performance that was unmatched by other designs of the era."
