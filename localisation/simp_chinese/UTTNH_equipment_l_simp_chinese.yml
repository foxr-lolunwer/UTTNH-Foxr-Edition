 GER_land_cruiser_equipment_1: "陆地巡洋舰 P.1000 巨鼠"
 GER_land_cruiser_equipment_1_short: "巨鼠"
 GER_land_cruiser_equipment_1_desc: "P.1000 鼠式是德国在第二次世界大战期间构思的一种超重型坦克。该设计由克虏伯于1942年提出，设想中的坦克重达1000吨，装备有两门280毫米的海军炮和多种辅助武器，装甲厚度达到360毫米。鼠式的目标是成为一种移动堡垒，能够在战场上压制任何敌人。然而，由于其庞大的体积、高昂的燃料消耗以及后勤支持的困难，该项目被认为不可行，并最终于1943年被取消。"
 helicopter_equipment: "直升机"
 helicopter_equipment_short: "直升机"
 helicopter_equipment_desc: "一种利用快速旋转的旋翼而非翅膀和前进动力的飞行器。这使得它能够在空中悬停，并对垂直高度的变化具有更好的控制能力。"
