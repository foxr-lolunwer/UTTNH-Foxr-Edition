 main_battle_tank_chassis: "45年现代主战坦克"
 modern_tank_chassis_0: "45年现代主战坦克"
 modern_tank_chassis_desc: "一款现代化的底盘，大量借鉴了之前的中型坦克设计，但更加强调速度和机动性，同时也允许携带比通常的中型坦克更厚的装甲和更强的火炮。最终的结果就是得到了一款可以担任各种角色的战车。"
 main_battle_tank_chassis_desc: "经验表明，轻型、中型和重型坦克的设计变的越来越趋同。重型坦克逐渐变得更具机动性，而轻型坦克则携带更重的武器和装甲以求生存。因此，坦克设计者逐渐将所有这三种设计统一为一种类型，即通用主战坦克。"
 modern_tank_chassis_1_desc: "对前几代载具的进一步发展，更专注于现代机动战争所需的速度。"
 main_battle_tank_chassis_1_desc: "对前几代载具的进一步发展，更专注于现代机动战争所需的速度。"
 modern_tank_chassis_1: "50年现代主战坦克"
 main_battle_tank_chassis_1: "50年现代主战坦克"
 modern_tank_chassis_2_desc: "面对核威胁的阴影，我们需要一种能够在保护乘员免受致命辐射的同时，还能在性能上超越以往型号的车辆。"
 main_battle_tank_chassis_2_desc: "面对核威胁的阴影，我们需要一种能够在保护乘员免受致命辐射的同时，还能在性能上超越以往型号的车辆。"
 modern_tank_chassis_2: "55年现代主战坦克"
 main_battle_tank_chassis_2: "55年现代主战坦克"
 modern_tank_chassis_3_desc: "由于聚能装药技术发展，已经能够轻易穿透半米厚的钢装甲，这款车辆不再过分强调防护，转而专注于提升机动性，同时保持一定的火力输出。"
 main_battle_tank_chassis_3_desc: "由于聚能装药技术发展，已经能够轻易穿透半米厚的钢装甲，这款车辆不再过分强调防护，转而专注于提升机动性，同时保持一定的火力输出。"
 modern_tank_chassis_3: "60年现代主战坦克"
 main_battle_tank_chassis_3: "60年现代主战坦克"
 modern_tank_chassis_4_desc: "这是一款实验性质的跨代坦克，它在以往型号的基础上进行了改进与升级，但幅度不大。 然而，滑膛炮和间隔装甲的应用为坦克发展带来了革命性的变化。"
 main_battle_tank_chassis_4_desc: "这是一款实验性质的跨代坦克，它在以往型号的基础上进行了改进与升级，但幅度不大。 然而，滑膛炮和间隔装甲的应用为坦克发展带来了革命性的变化。"
 modern_tank_chassis_4: "65年现代主战坦克"
 main_battle_tank_chassis_4: "65年现代主战坦克"
 modern_tank_chassis_5_desc: "随着计算机技术日趋成熟，这款坦克利用自动化系统来辅助乘员操作车辆。"
 main_battle_tank_chassis_5_desc: "随着计算机技术日趋成熟，这款坦克利用自动化系统来辅助乘员操作车辆。"
 modern_tank_chassis_5: "70年现代主战坦克"
 main_battle_tank_chassis_5: "70年现代主战坦克"
 modern_tank_chassis_6_desc: "基于以往冲突中汲取的经验，这款车辆在保护乘员免受伤害方面做得更好，同时集成了更先进的火控系统，可在2500米以上的距离上实现更高的精度。"
 main_battle_tank_chassis_6_desc: "基于以往冲突中汲取的经验，这款车辆在保护乘员免受伤害方面做得更好，同时集成了更先进的火控系统，可在2500米以上的距离上实现更高的精度。"
 modern_tank_chassis_6: "75年现代主战坦克"
 main_battle_tank_chassis_6: "75年现代主战坦克"
 modern_tank_chassis_7_desc: "作为一款集快速、灵活和强大火力于一身的坦克，它在通信和火控方面充分运用了计算机技术。"
 main_battle_tank_chassis_7_desc: "作为一款集快速、灵活和强大火力于一身的坦克，它在通信和火控方面充分运用了计算机技术。"
 modern_tank_chassis_7: "80年现代主战坦克"
 main_battle_tank_chassis_7: "80年现代主战坦克"
 modern_tank_chassis_8_desc: "坦克在现代战场上面临的威胁比以前更多，也更致命。一个勇敢的士兵携带的聚能火箭可以摧毁一辆价值百万美元的坦克，而直升机和快速飞行的喷气式战斗机可以毫不费力地摧毁整个排的装甲车。然而，可以说坦克仍然是现代战场最重要的特征——而这种现代底盘是50年经验的结果。"
 main_battle_tank_chassis_8_desc: "坦克在现代战场上面临的威胁比以前更多，也更致命。一个勇敢的士兵携带的聚能火箭可以摧毁一辆价值百万美元的坦克，而直升机和快速飞行的喷气式战斗机可以毫不费力地摧毁整个排的装甲车。然而，可以说坦克仍然是现代战场最重要的特征——而这种现代底盘是50年经验的结果。"
 modern_tank_chassis_8: "85年现代主战坦克"
 main_battle_tank_chassis_8: "85年现代主战坦克"
 modern_tank_chassis_9_desc: "作为装甲战争的终极进化,这头猛兽速度快、装甲精良、杀伤力强.最重要的是,它使用现代计算机,实现了前所未有的自动化水平和机组人员的表现。"
 main_battle_tank_chassis_9_desc: "作为装甲战争的终极进化,这头猛兽速度快、装甲精良、杀伤力强.最重要的是,它使用现代计算机,实现了前所未有的自动化水平和机组人员的表现。"
