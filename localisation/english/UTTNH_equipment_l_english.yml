 PHI_motorized_equipment_3: "M35 series 2½-ton 6×6 cargo truck"
 PHI_motorized_equipment_3_short: "M35A1"
 PHI_motorized_equipment_3_desc: "The M35 2½-ton cargo truck is a long-lived 2½-ton 6×6 cargo truck initially used by the United States Army and subsequently utilized by many nations around the world. Over time it evolved into a family of specialized vehicles. It inherited the nickname "Deuce and a Half" from an older 2½-ton truck, the World War II GMC CCKW."
 PHI_heavy_mechanized_equipment_3: "Armored Infantry Fighting Vehicle"
 PHI_heavy_mechanized_equipment_3_short: "AIFV"
 PHI_heavy_mechanized_equipment_3_desc: "The AIFV (Armored Infantry Fighting Vehicle) is an American tracked light armored vehicle that serves as an infantry fighting vehicle (IFV) in the armies of several countries. It is a development of the M113A1 armored personnel carrier. While it never saw service domestically, it was exported to several other countries, and currently sees service with over a dozen countries world wide."
 PHI_heavy_mechanized_equipment_5: "FNSS ACV-15"
 PHI_heavy_mechanized_equipment_5_short: "ACV-15"
 PHI_heavy_mechanized_equipment_5_desc: "ACV-15 is the designation of an amphibious Infantry fighting vehicle[6] family developed by the Turkish defense company FNSS Savunma Sistemleri A.Ş. This vehicle is also manufactured by DRB-HICOM Defence Technologies (DefTech) in Malaysia. The design is an attempt to combine the capabilities of an infantry fighting vehicle (IFV) and an armoured personnel carrier (APC). The ACV-15 is based on the American Advanced Infantry Fighting Vehicle, which in turn is based on the American M113A1 armored personnel carrier."
 
