 ##GENERIC TREE##
 infantry_equipment: "Пехотное снаряжение"
 infantry_equipment_short: "Пехотное снар."
 infantry_equipment_desc: "Индивидуальное и коллективное стрелковое оружие, а также прочие элементы экипировки пехотинца."
 infantry_equipment_0: "Базовое пехотное снаряжение"
 infantry_equipment_0_short: "Базовое снаряж."
 infantry_equipment_1: "Пехотное снаряжение I"
 infantry_equipment_1_short: "Оружие I"
 infantry_equipment_2: "Пехотное снаряжение II"
 infantry_equipment_2_short: "Оружие II"
 infantry_equipment_3: "Пехотное снаряжение III"
 infantry_equipment_3_short: "Оружие III"
 infantry_equipment_4: "Штурмовая винтовка I"
 infantry_equipment_4_short: "Штурмовая винтовка I"
 infantry_equipment_4_desc: "Ручное индивидуальное автоматическое огнестрельное оружие, предназначенное для поражения живой силы противника в ближнем бою и способное создавать высокую плотность огня."
 infantry_equipment_5: "Штурмовая винтовка II"
 infantry_equipment_5_short: "Штурмовая винтовка II"
 infantry_equipment_5_desc: "Несмотря ни на что, скромный пехотинец по-прежнему остается важнейшей составляющей любой армии мира. С этой целью модернизированная штурмовая винтовка, использующая композитные материалы, промежуточный патрон и специальные пластмассы, может дать одному солдату огневую мощь тридцати солдат, использующих винтовки с продольно-скользящим затвором."
 infantry_equipment_6: "Штурмовая винтовка III"
 infantry_equipment_6_short: "Штурмовая винтовка III"
 infantry_equipment_6_desc: "Дальнейшие улучшения в эргономике и материалах позволяют разработать более легкую и компактную штурмовую винтовку. С планками Пикатинни или Вивера, на которые можно устанавливать различные приспособления, такие как рукоятки или прицелы, это первое оружие космической эры."
 infantry_equipment_7: "Штурмовая винтовка IV"
 infantry_equipment_7_short: "Штурмовая винтовка IV"
 infantry_equipment_7_desc: "В прошлом карабин был короткой версией винтовки для кавалерии. Разработка бездымного пороха сделала карабин в целом устаревшим, за исключением нескольких моделей, но в последние десятилетия он вновь стал актуальным. С более слабым патроном, «штурмовой карабин», тем не менее, стал незаменимым оружием в городских условиях, столь обычных для современной войны."
 infantry_equipment_8: "Штурмовая винтовка V"
 infantry_equipment_8_short: "Штурмовая винтовка V"
 infantry_equipment_8_desc:"Благодаря экспериментам с безгильзовыми патронами, конструкциями «булл-пап» и электроникой, штурмовая винтовка продолжает развиваться и по сей день. Современная штурмовая винтовка имеет легкую конструкцию, стреляет промежуточным патроном, использует легко заменяемые магазины и оснащена широким спектром аксессуаров."
 
 infantry_at3: "РПГ I"
 infantry_at3_desc: "Развитие танкостроения и усиление танковой брони привело к модернизации противотанковых средств пехоты и появлению ручных противотанковых гранатомётов, способных пробивать большую толщину брони."
 infantry_at4: "РПГ II"
 infantry_at4_desc: "Развитие танкостроения и усиление танковой брони привело к модернизации противотанковых средств пехоты и появлению ручных противотанковых гранатомётов, способных пробивать большую толщину брони."
 infantry_at5: "РПГ III"
 infantry_at5_desc: "Развитие танкостроения и усиление танковой брони привело к модернизации противотанковых средств пехоты и появлению ручных противотанковых гранатомётов, способных пробивать большую толщину брони."
 infantry_at6: "РПГ IV"
