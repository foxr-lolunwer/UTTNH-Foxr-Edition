 PHI_motorized_equipment_3: "道奇 M35 2½吨 6×6 卡车"
 PHI_motorized_equipment_3_short: "M35A1"
 PHI_motorized_equipment_3_desc: "M35 2½吨载货卡车是一款拥有极长服役历史的2½吨级6×6驱动载货卡车。该车最初由美国陆军列装，随后被全球多个国家广泛采用。随着时间的推移，它已发展成为一个包含多种专用变种型号的庞大车族。该车继承了二战时期GMC CCKW型2½吨卡车的经典绰号——“两吨半”"
 PHI_heavy_mechanized_equipment_3: "装甲步兵战车"
 PHI_heavy_mechanized_equipment_3_short: "装甲步兵战车"
 PHI_heavy_mechanized_equipment_3_desc: "AIFV，即装甲步兵战车，是一款美制履带式轻型装甲车，主要被多国军队用作步兵战车。该车系M113A1装甲输送车的衍生型号。虽未获美国国内采用，但其外销成绩斐然，现役于全球十多个国家。"
 PHI_heavy_mechanized_equipment_5: "FNSS 15式装甲步兵战车"
 PHI_heavy_mechanized_equipment_5_short: "ACV-15"
 PHI_heavy_mechanized_equipment_5_desc: "ACV-15 是一款两栖步兵战车系列的型号，由土耳其国防公司FNSS防务系统公司研制，同时也由马来西亚的DRB-HICOM防务技术公司生产。该车设计融合了步兵战车与装甲运兵车的特性。ACV-15基于美国的先进步兵战车研发，而AIFV的前身则是著名的美制M113A1装甲运兵车。"
 CHI_infantry_equipment_4: "M14 步枪"
 CHI_infantry_equipment_4_short: "M14 步枪"
 CHI_infantry_equipment_5: "M16A1 步枪"
 CHI_infantry_equipment_5_short: "M16A1 步枪"
 CHI_infantry_equipment_6: "T65 步枪"
 CHI_infantry_equipment_6_short: "T65 步枪"
 CHI_infantry_equipment_6_desc: "T65突击步枪是由中华民国国军联勤总部开发并制造的一款突击步枪。该枪最初以采用短行程活塞传动系统的阿玛莱特 AR-18 为原型，但其在1975年亮相的原型枪则显示出深受 AR-15 系列步枪的影响，并对机械瞄具、枪托形状及护木进行了重新设计。其型号中的数字“65”代表民国65年（1976年），即该步枪定型的年份。"
 CHI_infantry_equipment_7: "T65K 步枪"
 CHI_infantry_equipment_7_short: "T65K 步枪"
 CHI_infantry_equipment_7_desc: "T65突击步枪是由中华民国国军联勤总部开发并制造的一款突击步枪。该枪最初以采用短行程活塞传动系统的阿玛莱特 AR-18 为原型，但其在1975年亮相的原型枪则显示出深受 AR-15 系列步枪的影响，并对机械瞄具、枪托形状及护木进行了重新设计。其型号中的数字“65”代表民国65年（1976年），即该步枪定型的年份。"
 CHI_infantry_equipment_8: "T86 卡宾枪"
 CHI_infantry_equipment_8_short: "T86 卡宾枪"
 CHI_infantry_equipment_8_desc: "T86步枪是一款导气式、弹匣供弹的突击步枪。它是中华民国国军联勤总部第二〇五兵工厂开展的第二个原创步枪设计项目。"
 CHI_mechanized_equipment_1: "27式 装甲运输车"
 CHI_mechanized_equipment_1_short: "27式"
 CHI_mechanized_equipment_2: "31式 装甲运输车"
 CHI_mechanized_equipment_2_short: "31式"
 CHI_mechanized_equipment_3: "33式 装甲运输车"
 CHI_mechanized_equipment_3_short: "33式"
 CHI_mechanized_equipment_4: "37式 装甲运输车"
 CHI_mechanized_equipment_4_short: "37式"
 CHI_mechanized_equipment_7: "CM-21装甲车"
 CHI_mechanized_equipment_7_short: "CM-21"
 CHI_mechanized_equipment_7_desc: "CM-21装甲车是由中华民国陆军装甲兵技术发展中心基于美制 M113 装甲运兵车（APC）设计并制造的一款装甲车辆。其首架原型车于1979年生产，并于1982年正式投入现役。CM-21 至今仍在服役中，总产量超过1,000辆，并衍生出了多种不同的改型。"