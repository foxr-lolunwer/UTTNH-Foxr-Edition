 light_tank_destroyer_equipment_desc: "坦克歼击车是火炮口径大于一般坦克的装甲战斗车辆，其火炮采用固定式安装，取代了传统炮塔。 轻型坦克歼击车使用轻型坦克底盘，因此拥有较好的机动性，但相比重型坦克歼击车，其火炮威力相对较弱。"
