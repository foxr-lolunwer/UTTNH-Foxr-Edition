 motorized_equipment_1: "GMC CCKW"
 motorized_equipment_1_desc: "Автотранспорт — первый шаг на пути к механизации армии. Гражданские грузовики легко адаптируются к военным нуждам: перевозят солдат, тянут пушки и доставляют снабжение. Это заметно повышает стратегическую мобильность пехотных частей, которым в противном случае пришлось бы двигаться маршем."
 motorized_equipment_2: "Грузовик M54"
 motorized_equipment_2_desc: "По мере того, как наши механизированные и бронетанковые войска становятся все быстрее и быстрее, мы не должны отставать от наших моторизованных войск. Используя улучшенные двигатели и новую 5-ступенчатую коробку передач, современный грузовой автомобиль может не отставать от гоночного танка."
 motorized_equipment_3: "Грузовик M55"
 motorized_equipment_3_desc: "По мере того, как нагнетатели становятся обычным явлением, даже скромный дизельный двигатель может развивать мощность, достаточную для перемещения тяжелого грузового автомобиля на больших скоростях"
 motorized_equipment_4: "Грузовик M80"
 motorized_equipment_4_desc: "Улучшение качества топлива позволяет нам разработать новый двигатель с гораздо более высокой степенью сжатия и более жесткими допусками, что приводит к значительному увеличению выходной мощности."
 motorized_equipment_5: "Грузовик M80"
 motorized_equipment_5_desc: "Современный грузовик должен быть не только быстрым, но и способным передвигаться по любой местности. Система полного привода в сочетании с многоступенчатыми коробками передач и мощным двигателем с турбонаддувом позволяет автомобилю преодолевать пересеченную местность намного быстрее, чем раньше."
 motorized_equipment_6: "Грузовик M90"
 motorized_equipment_6_desc: "Благодаря использованию впрыска топлива и турбокомпрессоров, а также электронных блоков управления автомобили будущего обгонят даже самые быстрые грузовики последнего поколения."
 
 motorized_rocket_equipment_2: "РСЗО М50"
 motorized_rocket_equipment_2_short: "Мотор. реакт. артилерия II"
 motorized_rocket_equipment_2_desc: "Реактивные установки доставляют снаряды к цели быстрее, чем это способна сделать традиционная артиллерия, но менее точны и гораздо дольше заряжаются. При установке на грузовик способны поменять позицию после выстрела быстрее, чем противник сможет отреагировать."
 motorized_rocket_equipment_3: "РСЗО М60"
 motorized_rocket_equipment_3_short: "Мотор. реакт. артилерия III"
 motorized_rocket_equipment_3_desc: "Реактивные установки доставляют снаряды к цели быстрее, чем это способна сделать традиционная артиллерия, но менее точны и гораздо дольше заряжаются. При установке на грузовик способны поменять позицию после выстрела быстрее, чем противник сможет отреагировать."

 mechanized_equipment: "Бронетранспортёры"
 mechanized_equipment_short: "Бронетранспортёры"
 mechanized_equipment_desc: "Механизированная пехота оснащена бронетранспортерами или боевыми машинами. От моторизированной она отличается тем, что ее техника обеспечивает определенную защиту от вражеского огня, в то время как моторизированные подразделения обычно снабжаются небронированными машинами — джипами и грузовиками."
