 FRA_medium_tank_equipment_2_desc: "索玛 S35是第二次世界大战期间法国骑兵部队使用的一款主力坦克。 它于1936年至1940年间生产并装备骑兵部队的装甲师。 以当时的眼光来看，这是一款机动性相对较好的中型坦克，在装甲防护和火力方面都优于其法国以及国外的竞争对手，例如同时期的德国三号坦克。 S35采用倾斜式铸造装甲结构，这种设计虽然强化了防护性能，但也增加了生产成本和维护难度。"
