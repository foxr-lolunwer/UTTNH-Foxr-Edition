 tank_heavy_machine_gun: "12.7毫米机枪"
 tank_heavy_machine_gun_desc: "一挺机枪能以低廉的成本提供优秀的反步兵火力。然而，就算使用了特制的穿甲弹药，其反装甲能力依然不尽人意。"
 flamethrower: "火焰喷射器"
 flamethrower_desc: "火焰喷射器是一种能喷射燃烧着的流质燃剂的装置。虽然它在巷战和攻坚战中大有作用，但它完全没有任何反装甲能力，而且往往需要受过特殊训练的人员操作才能发挥出其作用。"
 tank_auto_cannon: "20毫米机关炮"
 tank_auto_cannon_desc: "由一座速射防空炮改装而来，这门机关炮倾泻出的弹雨能够撕碎非装甲目标。然而较小的口径限制了它的反装甲能力。"
 tank_auto_cannon_2: "37毫米机关炮"
 tank_auto_cannon_2_desc: "由一座速射防空炮改装而来，这门机关炮倾泻出的弹雨能够撕碎非装甲目标。然而较小的口径限制了它的反装甲能力。"
 tank_anti_air_cannon: "20毫米防空炮"
 tank_anti_air_cannon_desc: "一门用于射击飞机的速射机关炮。作为对付地面目标的火力支援武器使用时，表现差强人意。"
 tank_anti_air_cannon_2: "37毫米防空炮"
 tank_anti_air_cannon_2_desc: "一门用于射击飞机的速射机关炮。作为对付地面目标的火力支援武器使用时，表现差强人意。"
 tank_anti_air_cannon_3: "双联装 20毫米防空炮"
 tank_anti_air_cannon_3_desc: "一门用于射击飞机的速射机关炮。作为对付地面目标的火力支援武器使用时，表现差强人意。"
 early_modern_anti_air_cannon: "双联装 37毫米防空炮"
 early_modern_anti_air_cannon_desc: "随着喷气式飞机的引入，旧的高射炮根本无法对付现代飞机。因此，更小口径、更高速度的火炮的发展是一种自然进化——虽然不一定能够一次命中摧毁一架飞机，但更高的炮口初速意味着瞄准的简化。"
 modern_anti_air_cannon: "旋转式 20毫米防空炮"
 modern_anti_air_cannon_desc: "一种多管旋转自动机关炮，能够在天空划出一道毁灭性的路径——对于任何不幸被困在其中的飞机都有毁灭性的效果。"
 advanced_modern_anti_air_cannon: "防空导弹发射炮台"
 advanced_modern_anti_air_cannon_desc: "一种防空导弹发射器，装备有多枚防空导弹。它进行了完全的数字化，并与雷达和其他防空手段协同作战，这种武器系统可以智能化地拦截和摧毁任何敢于进入其领空的飞机。"
 tank_close_support_gun: "21倍径/57毫米支援炮"
 tank_close_support_gun_desc: "这是一种小型武器，设计用于向敌方野战工事发射高爆弹，以协助步兵发起进攻。 虽然能够对付坦克，但其短枪管和有限的弹药使其无法有效对抗更强大的敌方坦克。"
 tank_medium_howitzer: "31倍径/105毫米榴弹炮"
 tank_medium_howitzer_desc: "一门经改造后，适合安装在坦克上的中型野战榴弹炮。它的主要职能是对非装甲目标提供曲射火力支援，但必要时也可以进行直射射击。这门火炮携带的穿甲弹药很少，不适合反坦克作战。"
 tank_medium_howitzer_2: "36倍径/127毫米榴弹炮"
 tank_medium_howitzer_2_desc: "一门经改造后，适合安装在坦克上的中型野战榴弹炮。它的主要职能是对非装甲目标提供曲射火力支援，但必要时也可以进行直射射击。这门火炮携带的穿甲弹药很少，不适合反坦克作战。"
 tank_heavy_howitzer: "33倍径/150毫米重型榴弹炮"
 tank_heavy_howitzer_desc: "一门经改造后，适合安装在坦克上的重型野战榴弹炮。它的主要职能是对非装甲目标提供曲射火力支援，但必要时也可以进行直射射击。这门火炮携带的穿甲弹药很少，不适合反坦克作战。"
 tank_post_war_howitzer: "37倍径/152毫米榴弹炮"
 tank_post_war_howitzer_desc: "研发专供装甲战车使用的榴弹炮，既可以缩小车身尺寸，又能将威力强大的高爆弹远距离投射出去。"
 tank_early_modern_howitzer: "40倍径/155毫米现代榴弹炮"
 tank_early_modern_howitzer_desc: "汲取了其他坦克设计的成功经验，这款榴弹炮在炮口初速上有了显著提升，从而实现了更远的射程。"
 tank_modern_howitzer: "39倍径/183毫米现代榴弹炮"
 tank_modern_howitzer_desc: "一门巨大的火炮，拥有巨大的炮口制退器和巨大的炮弹，能够摧毁射程内的任何东西。"
 tank_advanced_modern_howitzer: "51倍径/155毫米先进现代榴弹炮"
 tank_advanced_modern_howitzer_desc: "集成了计算机化的火控系统之后，这款火炮的精准度和杀伤力都达到了前所未有的水平。"
 tank_small_cannon: "42倍径/37毫米轻型火炮"
 tank_small_cannon_desc: "一门小而便宜的火炮，可以发射反步兵和反装甲炮弹。较小的口径意味着它的作用有限。"
 tank_small_cannon_2: "55倍径/47毫米轻型火炮"
 tank_small_cannon_2_desc: "一门小而便宜的火炮，可以发射反步兵和反装甲炮弹。较小的口径意味着它的作用有限。"
 early_light_modern_cannon: "61倍径 75毫米轻型火炮"
 early_light_modern_cannon_desc: "这是一款先进的轻型火炮，设计用于帮助轻型坦克拥有越级挑战重型目标的能力"
 light_modern_cannon: "56倍径/90毫米轻型火炮"
 light_modern_cannon_desc: "这是一款先进的超轻型火炮，能为侦察车俩提供意想不到的强大火力支援。"
 tank_medium_cannon: "42倍径/75毫米火炮"
 tank_medium_cannon_desc: "一门适用于多种任务的通用型武器。它在反步兵和反坦克作战中都不是最出色的，但它使载具极为灵活。"
 tank_medium_cannon_2: "50倍径/75毫米中型火炮"
 tank_medium_cannon_2_desc: "一门适用于多种任务的通用型武器。它在反步兵和反坦克作战中都不是最出色的，但它使载具极为灵活。"
 tank_heavy_cannon: "50倍径/90毫米重型火炮"
 tank_heavy_cannon_desc: "一门能发射大号炮弹的武器。这种火炮穿甲性能出色，对付非装甲目标也表现良好，它最大的缺点是庞大的尺寸和高昂的成本，这使得它过于笨重，几乎只能安装在特别设计来搭载这门火炮的载具上。"
 tank_heavy_cannon_2: "52倍径/105毫米重型火炮"
 tank_heavy_cannon_2_desc: "一门能发射大号炮弹的武器。这种火炮穿甲性能出色，对付非装甲目标也表现良好，它最大的缺点是庞大的尺寸和高昂的成本，这使得它过于笨重，几乎只能安装在特别设计来搭载这门火炮的载具上。"
 tank_heavy_cannon_3: "55倍径/120毫米重型火炮"
 tank_heavy_cannon_3_desc: "一门能发射大号炮弹的武器。这种火炮穿甲性能出色，对付非装甲目标也表现良好，它最大的缺点是庞大的尺寸和高昂的成本，这使得它过于笨重，几乎只能安装在特别设计来搭载这门火炮的载具上。"
 tank_super_heavy_cannon: "59倍径/152毫米超重型火炮"
 tank_super_heavy_cannon_desc: "性能无出其右，尺寸又极其夸张的武器。 这款武器几乎能摧毁一切目标，而那些能够对坦克构成威胁的目标，在这种武器面前也毫无还手之力。"
 tank_high_velocity_cannon: "57毫米高速反坦克炮"
 tank_high_velocity_cannon_desc: "一门为实现极高的初速设计的加农炮，其使用专门为之准备的炮弹。具备极佳的反装甲性能，但对于软目标将会较为乏力。"
 tank_high_velocity_cannon_2: "70倍径/76毫米高速反坦克炮"
 tank_high_velocity_cannon_2_desc: "一门为实现极高的初速设计的加农炮，其使用专门为之准备的炮弹。具备极佳的反装甲性能，但对于软目标将会较为乏力。"
 tank_high_velocity_cannon_3: "72倍径/90毫米高速反坦克炮"
 tank_high_velocity_cannon_3_desc: "一门为实现极高的初速设计的加农炮，其使用专门为之准备的炮弹。具备极佳的反装甲性能，但对于软目标将会较为乏力。"
 tank_early_modern_cannon: "60倍径/90毫米现代炮"
 tank_early_modern_cannon_desc: "随着安装在炮管上，可以在开火后清除烟雾的所谓炮膛排烟器的引入，可以使用更高能的发射药，产生更高的初速以及穿深。"
 tank_modern_cannon: "58口径/105毫米滑膛炮"
 tank_modern_cannon_desc: "现代滑膛炮的出现可以以更高的速度和更少的磨损发射炮弹，从而大大提高了装甲穿深。滑膛炮固有的误差可以被前面提到的高初速以及尾翼稳定抵消。"
 tank_advanced_modern_cannon: "52倍径/120毫米滑膛炮"
 tank_advanced_modern_cannon_desc: "这是一种真正令人胆寒的武器，它吸取了以往所有研发项目的经验，能够以极高的速度将炮弹法射到远方。 没有任何东西能够承受从这门火炮中射出的炮弹。"
 tank_cold_war_gas_turbine_engine: "冷战初期燃气涡轮发动机"
 tank_cold_war_gas_turbine_engine_desc: "相比于早期的燃气轮机本质上只是为地面车辆改装的喷气发动机的情况，这套系统从一开始就专门为坦克设计。 因此，其速度要远超早期型号。"
 tank_near_end_cold_war_gas_turbine_engine: "冷战末期燃气涡轮发动机"
 tank_near_end_cold_war_gas_turbine_engine_desc: "尽管使用了更多的燃料，但该燃气轮机中的压缩机设计更加优化，从而实现了极高的最大速度。"
 tank_cold_war_diesel_engine: "冷战初期柴油发动机"
 tank_cold_war_diesel_engine_desc: "得益于可靠的涡轮增压技术，柴油发动机不仅能够达到与汽油发动机相媲美的速度，而且相比于燃气轮机，在可靠性和应对恶劣环境的能力方面更胜一筹。"
 tank_near_end_cold_war_diesel_engine: "冷战末期柴油发动机"
 tank_near_end_cold_war_diesel_engine_desc: "随着世纪之交的临近，燃料的质量和稳定性都得到了显著提升。 因此，这款发动机可以被调校到远高于以往的水平，从而实现前所未有的速度和可靠性。"
 gen1_night_vision: "第一代夜视仪"
 gen1_night_vision_desc: "一套简单的主动夜视装置，使用红外聚光灯和特殊的视觉设备，使机组人员在黑暗中看清物体。"
 gen2_night_vision: "第二代夜视仪"
 gen2_night_vision_desc: "采用图像增强设备，移除红外聚光灯，同时保持良好的图像质量。"
 gen3_night_vision: "第三代夜视仪"
 gen3_night_vision_desc: "制造技术和化学技术的进步使得夜视仪具有与日间视觉相似的图像质量。"
 gen1_thermal_vision: "第一代热成像仪"
 gen1_thermal_vision_desc: "所有高于绝对零度的物体都会发射红外辐射，但这种辐射通常非常微弱，难以被传统红外设备探测到。 不过，利用锗、氟化钙或晶体硅等特殊材料制成的透镜，可以让足够强度的红外线通过，从而实现热成像瞄准功能。"
 gen2_thermal_vision: "第二代热成像仪"
 gen2_thermal_vision_desc: "与早期热成像设备在可靠性和分辨率上的不足相比，如今的热成像装置凭借精密制造技术的进步，已经能够在超过一公里的距离上识别物体。"
 gen3_thermal_vision: "第三代热成像仪"
 gen3_thermal_vision_desc: "利用数字计算机和电子电视技术，热成像图像的质量和放大倍率都得到了大幅提升。"
 slopped_turret_armor: "先进倾斜炮塔装甲"
 slopped_turret_armor_desc: "倾斜装甲是一种既不垂直也不水平的装甲。这种倾斜的装甲通常安装在坦克上。"
 armor_tech_1_tt: "启用5到9级的装甲升级选项。"
 armor_tech_2_tt: "启用10到14级的装甲升级选项。"
 armor_tech_3_tt: "启用15到17级的装甲升级选项。"
 armor_tech_4_tt: "启用18到20级的装甲升级选项。"
 engine_tech_1_tt: "启用5到9级的引擎升级选项。"
 engine_tech_2_tt: "启用10到14级的引擎升级选项。"
 engine_tech_3_tt: "启用15级到17级的引擎升级选项。"
 engine_tech_4_tt: "启用18到20级的引擎升级选项。"
 light_tank_chassis: "轻型坦克"
 medium_tank_chassis: "中型坦克"
