 CZE_cv_nav_bomber_equipment_1_desc: "这个版本是莱托夫 Š.328的一个变种，装备了英国肖特兄弟有限公司的浮标。主要用于南斯拉夫的训练目的。"
 CZE_heavy_fighter_equipment_1: "阿维亚 Bk.534"
 CZE_heavy_fighter_equipment_1_short: "阿维亚 Bk.534"
 CZE_heavy_fighter_equipment_1_desc: "阿维亚 B.534的主要改型之一便是Bk.534，其设计在机头处安装一门 20 毫米（0.79 英寸）厄利孔FFS-20机炮，而在两侧只安装两挺 7.92 毫米机枪。\n\n然而，由于在改装新机炮时遇到了一些问题。因此，只有少数飞机被交付给捷克斯洛伐克空军，其余 63 架被订购的飞机则为德国人完工。"
