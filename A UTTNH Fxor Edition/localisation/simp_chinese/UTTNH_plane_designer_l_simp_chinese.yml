 chute_1: "缓冲伞 I"
 chute_1_desc: "缓冲伞是一种设计用于从高速运动物体上展开的降落伞。 它可以用于多种目的，例如减速，提供控制和稳定性，或者作为引导伞来展开更大的降落伞。使用过缓冲伞的载具有多级降落伞系统、飞机和航天器回收系统等。"
 chute_2: "缓冲伞 II"
 chute_2_desc: "缓冲伞是一种设计用于从高速运动物体上展开的降落伞。 它可以用于多种目的，例如减速，提供控制和稳定性，或者作为引导伞来展开更大的降落伞。使用过缓冲伞的载具有多级降落伞系统、飞机和航天器回收系统等。"
