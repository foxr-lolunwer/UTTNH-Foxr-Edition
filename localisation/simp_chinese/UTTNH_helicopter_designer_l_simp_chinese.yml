 helicopter_rotor_2x_desc: "一种轻量且高效的双叶旋翼，专为小型飞行器设计。"
 helicopter_rotor_4x_desc: "一种重型而强大的四叶旋翼，能够承载更重的飞行器。"
 helicopter_rotor_2_4x_desc: "一对重型四叶旋翼，专为承载巨大重量而设计。"
 helicopter_jet_engine_1x_desc: "一种改良的早期喷气涡轮发动机，具有简单的轴输出。"
 helicopter_jet_engine_2x_desc: "一对改良的喷气涡轮发动机，具有简单的轴输出。"
 helicopter_jet_engine_1x_1_desc: "一种专为直升机使用而从头设计的涡轮轴发动机。"
 helicopter_jet_engine_2x_1_desc: "一对专为直升机使用而从头设计的涡轮轴发动机。"
 helicopter_jet_engine_1x_2_desc: "一种改进的专用自由涡轮涡轮轴发动机，具有更好的过滤器和改进的燃烧室形状，实现更高的功率输出。"
 helicopter_jet_engine_2x_2_desc: "一对改进的专用自由涡轮涡轮轴发动机，采用更高质量的过滤器和优化的燃烧室。"
 helicopter_jet_engine_1x_3_desc: "一种现代高效的自由涡轮涡轮轴发动机，带有轴流可变几何压缩机，对尘土和其他污染物具有更大的耐受性。"
 helicopter_jet_engine_2x_3_desc: "一对现代高功率的自由涡轮涡轮轴发动机，带有轴流可变几何压缩机和有效的过滤器，能够在尘土环境中运行。"
 helicopter_saam_desc: "一种短程空对空导弹，用于对抗敌对飞行器。"
 helicopter_cannon_1_desc: "一种小型自动火炮，由炮手手动瞄准。"
 helicopter_cannon_2_desc: "一种改进的自动火炮，带有稳定支架。"
 helicopter_cannon_3_desc: "一种先进的自动火炮，通过抬头显示屏电子瞄准。"
 helicopter_bomb_desc: "一颗安装在挂锁上的航空炸弹，或者放置在小型炸弹舱内。"
 helicopter_atgm_1_1x_desc: "一种简单的反坦克导弹，通过导线链路引导到目标。"
 helicopter_atgm_1_2x_desc: "一对简单的反坦克导弹，通过导线链路引导到目标。"
 helicopter_atgm_2_2x_desc: "一对专用的无线电链路引导的反坦克导弹。改进的翼设计有助于稳定。"
 helicopter_atgm_2_4x_desc: "四枚专用的无线电链路引导的反坦克导弹。改进的翼设计有助于稳定。"
 helicopter_atgm_3_2x_desc: "一对先进的反坦克导弹，带有自动电子引导协助枪手。串列装药弹头可击穿现代反应装甲。"
 helicopter_atgm_3_4x_desc: "四枚先进的反坦克导弹，带有自动电子引导协助枪手。串列装药弹头可击穿现代反应装甲。"
 helicopter_airdropped_mines_desc: "一组配备降落伞的水雷。"
 helicopter_armor_plate_small_desc: "在战略位置安装的钢板可以抵御小口径武器的射击。"
 helicopter_rwr_desc: "一套雷达侦测装置，当操作人员被敌对雷达系统追踪时发出警告。"
 helicopter_night_vision_desc: "一套近红外夜视装置，使飞行器能够在夜间行动中保持战斗效力。"
 helicopter_thermal_vision_desc: "一套红外热成像装置，使飞行器能够在夜间行动中保持战斗效力，并在所有条件下帮助目标获取。"
 helicopter_demining_coil_desc: "一种安装在货舱内的大型磁线圈，能够安全地远距离引爆地雷。"
 radar_ball_desc: "一种专用雷达追踪单元，通过电子监视提供目标信息和追踪功能。"
 side_turret_desc: "安装在飞行器侧面的重型机枪，用于近距离火力支援和防御。"
