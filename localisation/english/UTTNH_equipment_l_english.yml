 CHI_mechanized_equipment_7: "CM-21 Armored Vehicle"
 CHI_mechanized_equipment_7_short: "CM-21"
 CHI_mechanized_equipment_7_desc: "The CM-21 is an armored vehicle designed and manufactured by the Republic of China Armored Vehicle Development Center, based on the American M113 APC. The first prototype was manufactured in 1979, and the CM-21 officially entered service in 1982 and remains in use today, with over 1,000 units manufactured and a number of different variants."