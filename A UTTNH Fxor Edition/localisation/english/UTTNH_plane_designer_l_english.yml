 small_bomb_bay: "Small Bomb Bay"
 small_bomb_bay_desc: "A small bay to carry bombs. Being inside the fuselage reduces drag, but the structural changes necessary for it mean the plane can not do radical maneuvers in air combat."
 medium_bomb_bay: "Medium Bomb Bay"
 medium_bomb_bay_desc: "A mid-sized bomb bay allows carrying enough ordinace to strike a wide variety of targets."
