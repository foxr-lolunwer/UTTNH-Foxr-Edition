 large_plane_maritime_patrol_plane_airframe_0: "Inter-War Maritime Patrol Airframe"
 large_plane_maritime_patrol_plane_airframe_0_desc: "The fleet needs long-ranged planes to find their enemies far from shore. While somewhat outdated, this airframe offers the necessary range to cover large stretches of ocean."
 large_plane_maritime_patrol_plane_airframe_1: "Basic Maritime Patrol Airframe"
 large_plane_maritime_patrol_plane_airframe_1_desc: "The advent of more powerful carrier planes makes it necessary to find and destroy enemy fleets far from shore. The first step for this is to find them far out in the ocean, necessitating a new type of plane."
 large_plane_maritime_patrol_plane_airframe_2: "Improved Maritime Patrol Airframe"
 large_plane_maritime_patrol_plane_airframe_2_desc: "The dual threat of submarines and raiding cruisers requires patrolling vast stretches of ocean. This airframe is optimized for this."
 large_plane_maritime_patrol_plane_airframe_3: "Advanced Maritime Patrol Airframe"
 large_plane_maritime_patrol_plane_airframe_3_desc: "Radar and other sensors make it possible to find enemy fleets even in poor weather or dark nights, but all the new equipment requires a bigger airframe to carry it."
 large_plane_maritime_patrol_plane_airframe_4: "50's Maritime Patrol Airframe"
 large_plane_maritime_patrol_plane_airframe_4_desc: "With the dawn of the missile age, maritime patrol planes must be capable of operating even further from shore, and for longer durations."
 large_plane_maritime_patrol_plane_airframe_5: "55's Maritime Patrol Airframe"
 large_plane_maritime_patrol_plane_airframe_5_desc: ""
 large_plane_maritime_patrol_plane_airframe_6: "60's Maritime Patrol Airframe"
