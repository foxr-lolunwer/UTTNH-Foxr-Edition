 YUG_jet_fighter_equipment_4: "Микоян-Гуревич МиГ-21" 
 YUG_jet_fighter_equipment_4_short: "МиГ-21" 
 YUG_jet_fighter_equipment_4_desc: "МиГ-21 — советский лёгкий сверхзвуковой фронтовой истребитель третьего поколения, разработанный ОКБ Микояна и Гуревича во второй половине 1950-х годов. Первый «МиГ» с треугольным крылом. Самый распространённый сверхзвуковой самолёт в истории, также самый массовый истребитель 3-го поколения." 
