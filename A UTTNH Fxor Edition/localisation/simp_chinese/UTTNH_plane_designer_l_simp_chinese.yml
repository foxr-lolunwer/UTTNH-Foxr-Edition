 bouncing_bomb_release: "弹跳炸弹投弹装置"
 bouncing_bomb_release_desc: "此为一种炸弹挂架，设计用于挂载并投放能够跃过水面的特殊跳弹。这些跳弹在释放后会在水面连续弹跳，最终命中目标。投放机制的关键在于赋予炸弹后旋，以确保其飞行轨迹，并提高命中特定建筑结构的精确度。"
 earthshaker_bomb_release: "地震炸弹投弹装置"
 earthshaker_bomb_release_desc: "这是一种用于挂载和投放巨型震地弹的炸弹挂架和释放系统。该类炸弹被设计为撞击后能够深入地下爆炸，以此对目标的基础设施或建筑结构造成毁灭性破坏。"
 rocket_propelled_bombs: "火箭推进炸弹"
 rocket_propelled_bombs_desc: "火箭推进的非制导炸弹能够对舰船和类似的重装甲大型目标造成相当大的破坏。"
 improved_rocket_propelled_bombs: "重型火箭推进炸弹"
 improved_rocket_propelled_bombs_desc: "更大尺寸的火箭推进的非制导炸弹，携带更重的弹头，能够更有效地穿透目标。"
 jet_engine_advanced_turbojet_1x: "1x 涡轮喷气发动机"
