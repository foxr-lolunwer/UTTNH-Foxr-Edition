 rocket_artillery_equipment_short: "Ракеты"
 rocket_artillery_equipment_desc: "Реактивная артиллерия менее точна и скорострельна, чем традиционные орудия, однако недостатки окупаются эффектом от одновременного попадания нескольких ракет в цель."
 
