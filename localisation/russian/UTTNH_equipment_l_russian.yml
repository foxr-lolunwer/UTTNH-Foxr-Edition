 GER_modern_tank_equipment_3: "Leopard 1"
 GER_modern_tank_equipment_3_short: "Leopard 1" 
 GER_modern_tank_equipment_3_desc: "Леопард - ОБТ, разработанный фирмой «Porsche» в 1965 году. Имел сварной корпус, литую башню, а также нестабилизированную 105-мм пушку L7A3."
 GER_modern_tank_equipment_4: "Leopard 1A3"
 GER_modern_tank_equipment_4_short: "Leopard 1A3"
 GER_modern_tank_equipment_4_desc: "Модификация «Леопарда» с новой сварной башней с разнесенной броней (уровень защиты равен А2, объём башни вырос). Усовершенствованный прицел командира TRP-2A"
 GER_modern_tank_equipment_5: "Leopard 2A1"
 GER_modern_tank_equipment_5_short: "Leopard 2A1"
 GER_modern_tank_equipment_5_desc: "Усовершенствованная версия оригинального «Леопарда» со 120-мм пушкой Rh-120, новой системой управления огнём и двигателем мощностью в 1500 л.с."
 GER_modern_tank_equipment_6: "Leopard 2A4"
 GER_modern_tank_equipment_6_short: "Leopard 2A4"
 GER_modern_tank_equipment_6_desc: "Версия Leopard 2 с увеличенной бронезащитой, автоматическими системами пожаротушения, цифровой системой управления огнём и снарядами повышенной мощности"
 GER_modern_tank_equipment_7: "Leopard 2A5"
 GER_modern_tank_equipment_7_short: "Leopard 2A5"
 GER_modern_tank_equipment_7_desc: "Продолжение эволюции «Леопардов». Переработанная маска пушки, усиленные борта башни, модернизированный прицел наводчика и электрическая система стабилизации орудия."

