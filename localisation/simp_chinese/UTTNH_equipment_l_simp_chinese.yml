 anti_air_equipment_1: "牵引式防空炮"
 anti_air_equipment_1_short: "防空炮"
 anti_air_equipment_1_desc: "防空炮主要用来击落敌军的飞机，虽然速射火炮同样对地面目标有效。"
 anti_air_equipment_4: "1950 防空炮"
 anti_air_equipment_4_desc: "凭借小口径、高膛速的火炮，即便现代喷气机也难逃防空炮的火力封锁。"
 anti_air_equipment_5: "1960 防空炮"
 anti_air_equipment_5_desc: "防空火炮的固有缺陷在于炮管需要冷却，限制了持续射击能力。而多炮管旋转机构通过交替射击，有效解决了散热问题，从而大幅提升了射速。这种武器发射的子弹在空中会划出一道火力弹幕，足以将任何飞机撕成碎片。"
 anti_air_equipment_6: "1970 防空导弹"
 anti_air_equipment_6_desc: "地对空导弹是一种使装填高爆炸药的，自动制导导弹击落飞机的系统，而不是简单的机炮。"
 anti_air_equipment_7: "1980 防空导弹"
 anti_air_equipment_7_desc: "通过进一步将雷达集成到地对空导弹发射装置中，以及使用更先进的跟踪电路，导弹的精度可以大大提高。"
 anti_air_equipment_8: "1990 防空导弹"
 anti_air_equipment_8_desc: "闪光和箔条干扰会导致地空导弹错过目标，冗余系统和更严格的容差会给予导弹在任何距离击落任何飞机的结果。"
 TUR_anti_air_equipment_4: "MIM-14 奈基"
 TUR_anti_air_equipment_4_desc: "凭借小口径、高膛速的火炮，即便现代喷气机也难逃防空炮的火力封锁。"
 TUR_anti_air_equipment_5: "MIM-23 鹰"
 TUR_anti_air_equipment_5_desc: "防空火炮的固有缺陷在于炮管需要冷却，限制了持续射击能力。而多炮管旋转机构通过交替射击，有效解决了散热问题，从而大幅提升了射速。这种武器发射的子弹在空中会划出一道火力弹幕，足以将任何飞机撕成碎片。"
 TUR_anti_air_equipment_6: "轻剑"
 artillery_equipment_2: "改良型火炮"
 artillery_equipment_2_desc: "新榴弹炮的设计利用新的液压反冲装置和更长的炮管。"
 artillery_equipment_3: "先进型火炮"
 artillery_equipment_3_desc: "重量更轻的火炮能够被分解运输，为那些以前难以获得火炮支持的地区提供火力支持。"
 artillery_equipment_4: "1950 火炮"
 artillery_equipment_4_desc: "采用新型下落式炮闩、优化型炮架及模块化设计的火炮系统，在显著提升了机动性能的同时，确保了强大的火力和远距离打击能力。"
 artillery_equipment_5: "1960 火炮"
 artillery_equipment_5_desc: "火炮总是可以改进的，于是在模拟计算机和集成无线电的配合下产生了更好的野战炮。"
 artillery_equipment_6: "1970 火炮"
 artillery_equipment_6_desc: "在坦克、喷气式飞机、直升机和其他武器之间，火炮仍然是现代军队中最致命的武器之一。这些新型号的范围更大，也更准确。"
 artillery_equipment_7: "1980 火炮"
 artillery_equipment_7_desc: "第一代火炮已经研制出来，它有计算机来帮助瞄准和射击。"
 artillery_equipment_8: "1990 火炮"
 artillery_equipment_8_desc: "开发更精确的火炮意味着我们可以在25公里外夷平一座建筑物，而不会伤害到旁边的任何人。"
