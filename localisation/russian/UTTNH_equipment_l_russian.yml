 railway_gun_equipment: "Железнодорожная артиллерия"
 railway_gun_equipment_desc: "Тяжелая пушка, установленная для перевозки на железнодорожную платформу."
 railway_gun_desc: "Железные дороги позволяют перемещать тяжелые орудия вглубь страны на неплохой скорости и эффективно обстреливать вражеские позиции с большой дистанции."
 railway_gun_equipment_1: "Железнодорожное орудие"

 floating_harbor_equipment: "Плавучая гавань"
 floating_harbor_equipment_desc: "Набор понтонов и готовых бетонных построек, которые можно перемещать по воде и собирать за считаные часы, создавая укрытые платформы для выгрузки припасов."
 floating_harbor_equipment_1: "Плавучая гавань"
 floating_harbor_equipment_1_desc: "Набор понтонов и готовых бетонных построек, которые можно перемещать по воде и собирать за считаные часы, создавая укрытые платформы для выгрузки припасов."
 
 #ЛЁГКИЕ ТАНКИ
 gw_tank_equipment: "Танк Первой мировой"
 gw_tank_equipment_short: "Танк Первой мировой"
 gw_tank_equipment_desc: "Танки периода Первой мировой войны разрабатывались одновременно и независимо друг от друга Великобританией и Францией, чтобы переломить ход окопной войны. Само слово «танк» («цистерна») было принято британцами в самом начале разработки с целью скрыть ее истинное назначение. Ранние танки были медлительны, вооружены пулеметами и пушками малого калибра, а их броня могла защитить только от стрелкового вооружения."
 
