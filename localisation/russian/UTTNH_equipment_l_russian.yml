 asymmetric1: "Асимметричная война"
 asymmetric1_desc: "Асимметричная война — война между противниками, в военных силах которых имеется существенный дисбаланс (асимметрия) либо которые применяют кардинально различные стратегии и тактику. Чтобы компенсировать дисбаланс традиционных средств ведения боя, более слабая сторона асимметричной войны обращается к нетрадиционным средствам, таким как, партизанская война, террористические акты и т.д."
