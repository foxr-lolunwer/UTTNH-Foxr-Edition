 large_plane_airframe_0: "Inter-War Large Airframe"
 large_plane_airframe_0_desc: "This very large airframe has plenty of space to carry bombs or fluel tanks. However, it is clear that its development potential is severely limited. New generations of strategic bombers are already on the horizon."
 large_plane_airframe_1: "Basic Large Airframe"
 large_plane_airframe_1_desc: "This airframe was designed to test the potential of a true strategic bomber, able to attack industrial targets deep inside enemy territory, and bring its crew back alive."
 large_plane_airframe_2: "Improved Large Airframe"
 large_plane_airframe_2_desc: "With the concept of a strategic bomber now well proven, this airframe was designed to improve payload and range, while having sufficent potential for future growth."
 large_plane_airframe_3: "Advanced Large Airframe"
 large_plane_airframe_3_desc: "Optimized for very long range flying at very high altitude, this airframe is capable of carrying a sizable payload deep into the heart of enemy territory."
 large_plane_airframe_4: "50's Large Airframe"
 large_plane_airframe_4_desc: "Jet propulsion offers a quantum leap in performance. This airframe was designed to take advantage of this."
 large_plane_airframe_5: "55's Large Airframe"
