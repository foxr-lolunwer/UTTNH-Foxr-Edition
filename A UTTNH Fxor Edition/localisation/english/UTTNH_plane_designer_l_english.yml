 large_bomb_bay: "Large Bomb Bay"
 large_bomb_bay_desc: "A large bay to carry enough ordinace to damage or destroy even extensive factories and other hard targets."

 tank_buster_1: "Anti-Tank Cannon I"
 tank_buster_1_desc: "Adapted from an anti-tank gun used by the Army, this gun can destroy even modern tanks with well-placed shots. However, its heavy weight and awkward construction severely limit the aircraft's performance."
 tank_buster_2: "Anti-Tank Cannon II"
 tank_buster_2_desc: "The heavier tanks now in service require a much larger gun to combat. While extremely heavy and unwieldy, it is very capable as a weapon for attacks against enemy positions."
 tank_buster_3: "Anti-Tank Cannon III"
 tank_buster_3_desc: ""

 fuel_tanks_small: "Extra Fuel Tanks"
 fuel_tanks_small_desc: "Devoting more internal space of the airframe for fuel increases the plane's range, but it also makes the plane a lot more flammable."
 self_sealing_fuel_tanks_small: "Self Sealing Fuel Tanks"
 self_sealing_fuel_tanks_small_desc: "By adding a layer of specially-treated rubber around the fuel tanks, a hit to the fuel tank does not cripple an airplane as the tank will seal itself over time, preventing loss of fuel."
 armor_plate_medium: "$armor_plate_small$"
 armor_plate_medium_desc: "Armor around the engines and the more fragile parts of the fuselage gives the plane significantly better survivability, at the cost of range."
