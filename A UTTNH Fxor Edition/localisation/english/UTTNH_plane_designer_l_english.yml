 air_ground_radar_5_desc: ""
 air_ground_radar_6: "Air-Ground Radar VI"
 air_ground_radar_6_desc: ""

 air_air_radar_1: "Air-Air Radar I"
 air_air_radar_1_desc: "A set of radar antennas on the airplane allows a trained operator to find an airborne target even in darkness."
 air_air_radar_2: "Air-Air Radar II"
 air_air_radar_2_desc: "With a more powerful transmitter, this radar set can detect targets over a longer distance."
 non_strategic_materials_small: "Non-Strategic Materials Usage"
 non_strategic_materials_small_desc: "By substituting specially-treated wood or fabric for aluminum wherever possible, we can drastically reduce the usage of strategic materials. However, wood and fabric don't stand up very well to modern weapons."
 air_air_radar_3: "Air-Air Radar III"
 air_air_radar_3_desc: ""
 air_air_radar_4: "Air-Air Radar IV"
 air_air_radar_4_desc: ""
 air_air_radar_5: "Air-Air Radar V"
 air_air_radar_5_desc: ""
 air_air_radar_6: "Air-Air Radar VI"
 air_air_radar_6_desc: ""
 air_air_radar_7: "Air-Air Radar VII"
 air_air_radar_7_desc: ""

 drop_tanks: "Drop Tanks I"
 drop_tanks_desc: "Small, disposable tanks that hold extra fuel give our fighters some extra range when on offensive missions. Since they are dropped before combat, they don't impede combat performance."
 drop_tanks1: "Drop Tanks II"
 drop_tanks1_desc: ""
 drop_tanks2: "Drop Tanks III"
 drop_tanks2_desc: ""

 dive_brakes_small: "Dive Brakes"
 dive_brakes_small_desc: "A set of spoilers along the trailing edge of the wing deploy when the plane enters a dive, reducing overall speed and allowing the plane to pull out of steep dives without ripping its wings off. this, in turn, allows the plane to attack from a near-vertical dive, drastically increasing accuracy."
 non_strategic_materials_medium: "$non_strategic_materials_small$"
 non_strategic_materials_medium_desc: "$non_strategic_materials_small_desc$"
 non_strategic_materials_large: "$non_strategic_materials_small$"
 non_strategic_materials_large_desc: "$non_strategic_materials_small_desc$"
 floats: "Floats"
 floats_desc: "A seat of floatation devices mounted under the airframe allows the plane to land on water. This makes scouting missions for enemy naval assets easier, but also drastically reduces agility."
 flying_boat_medium: "Flying Boat"
 flying_boat_medium_desc: "Instead of mounting a landing gear, the underside of the plane can be shaped to be able to land on water. this makes scouting missions over water much easier."
 flying_boat_large: "$flying_boat_medium$"
 flying_boat_large_desc: "$flying_boat_medium_desc$"
 guided_anti_ship_missile: "Guided Anti Ship Missile I"
 guided_anti_ship_missile_desc: "Effectively an anti-ship bomb with a rocket engine and radio guidance, this new weapon of war is a serious threat to all ships currently afloat."
 fixed_explosive_charge: "Fixed Explosive Charge"
 fixed_explosive_charge_desc: "A fixed hollow charge turns the plane into a flying bomb. If the plane is steered into an enemy ship, it would cause dramatic destruction, but at the cost of the plane and the crew both being lost."
 recon_camera: "Recon Camera"
 recon_camera_desc: "A set of cameras with special lenses, allowing the plane to take accurate pictures of enemy formations and installations even from high altitude."
 airdropped_mines: "Airdropped Mines"
 airdropped_mines_desc: "A set of naval mines equipped with a parachute, which allows them to be dropped from a plane."
 demining_coil: "Demining Coil"
 demining_coil_desc: "A large coil mounted on the airframe allows the plane to project a powerful magentic field, which causes magnetic mines in its flightpath to explode."

 small_plane_airframe_0: "Inter-War Small Airframe"
 small_plane_airframe_0_desc: "Since the early days of the Great War, aviation has advanced in leaps and bounds. This airframe represents the culmination of these developments, but it is clear that its growth potential is limited."
 small_plane_airframe_1: "Basic Small Airframe"
 small_plane_airframe_1_desc: "In recent years, a number of new technologies has emerged, allowing for the construction of very capable, yet small, planes. This airframe represents just the first step on that road."
 small_plane_airframe_2: "Improved Small Airframe"
 small_plane_airframe_2_desc: "With improved aerodynamics and more robust construction, this airframe represents a clear step forward compared to the basic model."
 small_plane_airframe_3: "Advanced Small Airframe"
 small_plane_airframe_3_desc: "Thoroughly optimized for performance, this airframe represents the absolute maximum of what can be done with a piston-driven airplane."
 small_plane_airframe_4: "45's Small Airframe"
 small_plane_airframe_4_desc: "This airframe is designed to take advantage of the great speeds offered by modern engines and solve some of the structural problems that come with flying at high sub-sonic speeds."
