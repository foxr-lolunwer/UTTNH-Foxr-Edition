 GER_modern_tank_equipment_1: "E-75主战坦克"
 GER_modern_tank_equipment_1_short: "E-75主战坦克"
 GER_modern_tank_equipment_1_desc: "发展（简称为E）系列是二战末期德国为生产标准化坦克设计系列化而做出的尝试。 该系列计划涵盖六种不同的重量级别。E-75 标准坦克计划在成为一种标准的中型坦克，以取代黑豹和虎式坦克系列，以及基于这些坦克底盘的衍生型号。"
 GER_modern_tank_equipment_2: "E-90主战坦克"
 GER_modern_tank_equipment_2_short: "E-90主战坦克"
 GER_modern_tank_equipment_3: "豹 1主战坦克"
 GER_modern_tank_equipment_3_short: "豹 1主战坦克"
 GER_modern_tank_equipment_3_desc: "豹式主战坦克，是由联邦德国保时捷公司于1965年推出并服役的一款经典型号。研发时期，人们普遍认为HEAT破甲弹技术的发展使得传统重型装甲的防护价值降低，因此在设计上，\"豹\"式主战坦克更侧重于火力投射能力和越野机动性。在火力方面，它装备了当时西方阵营标准的L7系列德国产105毫米线膛炮，越野性能在同代坦克中也鲜有匹敌。"
 GER_modern_tank_equipment_4: "豹1 主战坦克"
 GER_modern_tank_equipment_4_short: "豹1 主战坦克"
 GER_modern_tank_equipment_4_desc: "豹式主战坦克，是由联邦德国保时捷公司于1965年推出并服役的一款经典型号。研发时期，人们普遍认为HEAT破甲弹技术的发展使得传统重型装甲的防护价值降低，因此在设计上，\"豹\"式主战坦克更侧重于火力投射能力和越野机动性。在火力方面，它装备了当时西方阵营标准的L7系列德国产105毫米线膛炮，越野性能在同代坦克中也鲜有匹敌。"
