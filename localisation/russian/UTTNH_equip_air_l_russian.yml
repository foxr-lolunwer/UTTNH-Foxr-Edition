 YUG_jet_fighter_equipment_6: "Микоян-Гуревич МиГ-23" 
 YUG_jet_fighter_equipment_6_short: "МиГ-23" 
 YUG_jet_fighter_equipment_6_desc: "Микоян-Гуревич МиГ-23 - истребитель третьего поколения с крылом изменяемой стреловидности, разработанный в ОКБ Микояна и Гуревича. Это был первый советский истребитель с системой обнаружения и поражения целей в нижней полусфере, и один из первых вооружённых ракетами средней дальности." 
