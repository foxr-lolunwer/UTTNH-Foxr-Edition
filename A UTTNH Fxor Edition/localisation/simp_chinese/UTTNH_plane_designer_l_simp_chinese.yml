 drone_airframe_1: "70年无人机机身"
 drone_airframe_1_desc: "无人驾驶飞行器(UAV)，通常被称为无人机，是一种没有任何人类飞行员、机组人员或乘客的飞机。无人机是无人驾驶飞机系统(UAS)的一个组成部分，包括增加一个地面控制器和一个与无人机通信的系统。"
 drone_airframe_2: "80年无人机机身"
 drone_airframe_2_desc: "无人驾驶飞行器 (UAV)，通常称为无人机，是一种没有任何人类飞行员、机组人员或乘客的飞行器。无人机是无人驾驶飞机系统 (UAS) 的一个组成部分，其中包括地面控制器和与无人机通信的系统。"
 drone_airframe_3: "90年无人机机身"
