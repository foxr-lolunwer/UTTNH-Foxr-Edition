 FIN_light_tank_equipment_3_short: "BT-42型快速坦克"
 FIN_light_tank_equipment_3_desc: "缴获的BT-7快速坦克经过改装，搭载了一门由芬兰研制的114 毫米榴弹炮，并为此专门设计了炮塔上部结构。 但由于整体重心较高，操纵稳定性不佳，BT-42坦克在1942年苏芬战争的战场上，无法有效击穿苏军制式坦克的厚重倾斜装甲。"
 FIN_light_tank_equipment_4: "T-50轻型坦克"
 FIN_light_tank_equipment_4_short: "T-50轻型坦克"
 gw_tank_equipment: "一战坦克"
 gw_tank_equipment_short: "一战坦克"
 gw_tank_equipment_desc: "为了打破一战西线战场上堑壕战的僵持局面，英国和法国几乎同时期分别独立地研发了坦克。 英国人在早期研发阶段，出于保密需求，将这类武器命名为水罐，尔后衍生为大名鼎鼎的坦克。 初期的坦克装备有机枪和小口径火炮，行驶速度缓慢，且装甲防护薄弱，仅能防御轻武器的射击。"
