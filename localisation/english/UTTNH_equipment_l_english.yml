 artillery_equipment_2: "Improved Artillery"
 artillery_equipment_2_desc: "New howitzer designs, taking advantage of new hydraulic recoil devices and longer barrels."
 artillery_equipment_3: "Advanced Artillery"
 artillery_equipment_3_desc: "Light-weight artillery capable of being broken down for transport, making it possible to bring artillery support to areas previously difficult to reach."
 artillery_equipment_4: "50' Artillery"
 artillery_equipment_4_desc: "New drop-breech designs, as well as improved carriages and modular assemblies, result in a mobile artillery piece which hits hard and far."
 artillery_equipment_5: "60' Artillery"
 artillery_equipment_5_desc: "Artillery guns can always be improved, with computer simulations and radio integration resulting in a better field gun."
 artillery_equipment_6: "70' Artillery"
 artillery_equipment_6_desc: "Between the tank, jet, helicopter and more, artillery is still one of the deadliest arms of the modern army. These new models have greater range, and are more accurate."
 artillery_equipment_7: "80' Artillery"
 artillery_equipment_7_desc: "The first artillery guns have been developed which have computers to help in aiming and firing."
 artillery_equipment_8: "90' Artillery"
 artillery_equipment_8_desc: "Developing more accurate artillery guns means that we can level a single building from 25 kilometers away without harming anyone standing next to it."

