 USA_jet_fighter_equipment_6_desc: "F-4C 进行了升级，包括更先进的航空电子设备和AN/APQ-109雷达。于1965年6月首飞。在美国空军中，一位飞行员和两位武器系统官驾驶F-4D成为了击落多架敌机的王牌飞行员。"
