 cv_small_plane_airframe_0: "Inter-War Carrier Airframe"
 cv_small_plane_airframe_0_desc: "Equipped with an arresting hook and strengthened landing gear, this airframe is capable of operating from an aircraft carrier."
 cv_small_plane_airframe_1: "Basic Carrier Airframe"
 cv_small_plane_airframe_1_desc: "Incorporating new technologies developed for land-based planes, this airframe is just as capable, but can be launched from the deck of a carrier."
 cv_small_plane_airframe_2: "Improved Carrier Airframe"
 cv_small_plane_airframe_2_desc: "To keep pace with developments in land-based aviation, this airframe was designed with new technologies to increase range and performance."
 cv_small_plane_airframe_3: "Advanced Carrier Airframe"
 cv_small_plane_airframe_3_desc: "The rigorous nature of carrier aviation limits how big and capable an airframe can be. This airframe represents the absolute maximum that can be achieved with a conventionally powered airframe."
