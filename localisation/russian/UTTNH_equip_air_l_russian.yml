 scout_plane_equipment: "Самолёт-разведчик"
 scout_plane_equipment_desc: "Самолёт, спроектированный специально для проведения фоторазведки. Главным образом полагается на скорость и незаметность, для ведения боя не приспособлен."
 scout_plane_equipment_1: "Самолёт-разведчик I"
 scout_plane_equipment_1_desc: "Сбор данных о передвижениях войск и флота противника — важная задача авиации со времён её первого боевого применения в Первой мировой войне и по наше время."
 scout_plane_equipment_2: "Самолёт-разведчик II"
 scout_plane_equipment_2_desc: "Разрабатывая самолёты специально для разведки с воздуха и дальней разведки, мы обеспечиваем себе регулярное поступление точных данных о намерениях и возможностях нашего противника."
 scout_plane_equipment_3: "Самолёт-разведчик III"
 scout_plane_equipment_3_desc: "Разрабатывая самолёты специально для разведки с воздуха и дальней разведки, мы обеспечиваем себе регулярное поступление точных данных о намерениях и возможностях нашего противника."
 scout_plane_equipment_4: "Самолёт-разведчик IV"
 scout_plane_equipment_4_desc: "Разрабатывая самолёты специально для разведки с воздуха и дальней разведки, мы обеспечиваем себе регулярное поступление точных данных о намерениях и возможностях нашего противника."
 scout_plane_equipment_5: "Самолёт-разведчик V"
 scout_plane_equipment_5_desc: "Разрабатывая самолёты специально для разведки с воздуха и дальней разведки, мы обеспечиваем себе регулярное поступление точных данных о намерениях и возможностях нашего противника."
 
