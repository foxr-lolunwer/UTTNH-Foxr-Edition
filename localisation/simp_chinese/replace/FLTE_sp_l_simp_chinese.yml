 # 进度
  FLTE_sp_general_pr_br_template: "项目进度报告"
  FLTE_sp_general_pr_br_1: "$FLTE_sp_general_pr_br_template$"
  FLTE_sp_general_pr_br_1_desc: "我们的科学家在核心理论上取得了里程碑式的进展。这一成果不仅直接跨越了多道技术门槛，更产生了意想不到的溢出效应，使我国整体科研体系获得了系统性的升华。"
  FLTE_sp_general_pr_br_1_option_1: "$FLTE_sp_general_pr_option_template$"
  FLTE_sp_general_pr_br_2: "$FLTE_sp_general_pr_br_template$"
  FLTE_sp_general_pr_br_2_desc: "实验数据异常完美，关键瓶颈已被成功攻克。团队的士气大振，研发进度远超预期，项目提前落地已指日可待。"
  FLTE_sp_general_pr_br_2_option_1: "$FLTE_sp_general_pr_option_template$"
  FLTE_sp_general_pr_br_3: "$FLTE_sp_general_pr_br_template$"
  FLTE_sp_general_pr_br_3_desc: "一切正按部就班地进行。尽管没有惊喜，但科学家们稳步完成了既定的实验阶段，所有关键指标均符合初步设计要求。"
  FLTE_sp_general_pr_br_3_option_1: "$FLTE_sp_general_pr_option_template$"
  FLTE_sp_general_pr_br_4: "$FLTE_sp_general_pr_br_template$"
  FLTE_sp_general_pr_br_4_desc: "虽然遭遇了一些琐碎的技术困难，但团队仍设法从实验余量中挤出了些许进展。虽然步履缓慢，但我们确实正在接近目标。"
  FLTE_sp_general_pr_br_4_option_1: "$FLTE_sp_general_pr_option_template$"
  FLTE_sp_general_pr_br_5: "$FLTE_sp_general_pr_br_template$"
  FLTE_sp_general_pr_br_5_desc: "研发工作陷入了僵局。目前的实验陷入了死循环，理论模型无法解释观测到的偏差，我们需要投入更多精力进行基础性的排查。"
  FLTE_sp_general_pr_br_5_option_1: "$FLTE_sp_general_pr_option_template$"
  FLTE_sp_general_pr_br_6: "$FLTE_sp_general_pr_br_template$"
  FLTE_sp_general_pr_br_6_desc: "一次关键的实验事故或理论误导让我们付出了惨痛代价。由于关键原型机的损毁和数据的丢失，项目不得不回溯到之前的阶段进行重构。"
  FLTE_sp_general_pr_br_6_option_1: "$FLTE_sp_general_pr_option_template$"
 # 科学家经验
  FLTE_sp_general_pr_scientist_exp_template: "科研团队近期状况"
  FLTE_sp_general_pr_scientist_exp_1_desc_template: "通过此次迭代的磨合，团队成员间建立了一套极高效率的沟通机制，并掌握了更科学的实验方法。这种经验的沉淀使他们未来的成长速度将大幅提升。"
  FLTE_sp_general_pr_scientist_exp_2_desc_template: "这一阶段研究团队攻克了数个科研难题。这种实战锻炼为科学家们带来了极高的专业水平提升。"
  FLTE_sp_general_pr_scientist_exp_3_desc_template: "随着项目的深入，团队对该领域的技术细节有了更深层的把握。实践中的反复推演让参与者的技术评估与执行能力得到了§Y显著增长§!。"
  FLTE_sp_general_pr_scientist_exp_4_desc_template: "虽然本阶段的任务较为琐碎，但点滴积累亦是成长。科学家们通过处理这些日常实验数据，进一步巩固了他们的专业技能。"
  FLTE_sp_general_pr_scientist_exp_5_desc_template: "项目组内部出现了严重的学术分歧，加之长期高压工作导致的士气崩坏，研发团队正面临分裂的边缘。如果不能及时处理这起人事危机，整个项目的未来将蒙上阴影。"
  FLTE_sp_general_pr_scientist_exp_5_option_1_template: "就这样吧"
  FLTE_sp_general_pr_scientist_exp_5_option_2_template: "立即介入"
