 light_flame_tank: "轻型喷火坦克连"
 light_flame_tank_desc: "一个由装备了火焰喷射器的轻型载具组成的连队，能在突袭城市或要塞时提供支援。"
 medium_flame_tank: "中型喷火坦克连"
 medium_flame_tank_desc: "一个由装备了火焰喷射器的中型载具组成的连队，能在突袭城市或要塞时提供支援。"
 heavy_flame_tank: "重型喷火坦克连"
 heavy_flame_tank_desc: "一个由装备了火焰喷射器的重型载具组成的连队，能在突袭城市或要塞时提供支援。"
 land_cruiser_chassis: "陆地巡洋舰底盘"
 land_cruiser_chassis_desc: "这是一种采用巨型底盘的重型车辆，具备厚实的装甲防护，旨在搭载超重型武器并在严酷的战场环境中生存。 但受其庞大体积所累，油耗极高，机动性较差。"
