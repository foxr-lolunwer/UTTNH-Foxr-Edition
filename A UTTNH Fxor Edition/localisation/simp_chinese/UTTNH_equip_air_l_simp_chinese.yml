 USA_jet_fighter_equipment_4_desc: "麦克唐纳F-101 巫毒是一款超音速喷气式战斗机，曾在美国空军和加拿大皇家空军服役。"
 USA_jet_fighter_equipment_5: "麦克唐纳-道格拉斯 F-4C 幻影 II型"
 USA_jet_fighter_equipment_5_short: "F-4C 幻影 II型"
 USA_jet_fighter_equipment_5_desc: "麦克唐纳·道格拉斯 F-4 幻影II型，由麦克唐纳飞行器公司为美国海军研制，是一种串列双座、双引擎、全天候、远程超音速喷气式飞机，兼具截击机和战斗轰炸机的能力。"
