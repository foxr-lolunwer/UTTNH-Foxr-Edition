 jet_fighter_equipment_1: "1946 喷气式战斗机"
 jet_fighter_equipment_1_short: "1946 喷气式战斗机"
 jet_fighter_equipment_1_desc: "首次采用喷气发动机的战斗机被归类为第一代喷气式战斗机。少数此类飞机在第二次世界大战的最后阶段问世，但仅参与了极少的战斗行动。"
 jet_fighter_equipment_2: "1950 喷气式战斗机"
 jet_fighter_equipment_2_short: "1950 喷气式战斗机"
 jet_fighter_equipment_2_desc: "以朝鲜战争期间使用的F-86为例，成熟的后掠翼喷气战斗机设计已经能够在跨音速范围内提供良好的可控性。"
 jet_fighter_equipment_3: "1955 喷气式战斗机"
 jet_fighter_equipment_3_short: "1955 喷气式战斗机"
 jet_fighter_equipment_3_desc: "在朝鲜战争空战经验的基础上，加之核战争环境下的作战需求，推动了第二代战斗机技术的快速发展。该代战机的研发同时受益于空气动力学、推进系统及航空材料（以铝合金为主）的技术飞跃，从而能够应用后掠翼、三角翼及面积律机身等先进设计。后燃式涡轮喷气发动机的普遍应用，使得这一代战机成为首批实现批量超音速飞行的机型，而具备稳定地保持水平超音速飞行的能力也成为了其显著特征。"
 jet_fighter_equipment_4: "1960 喷气式战斗机"
 jet_fighter_equipment_4_short: "1960 喷气式战斗机"
 jet_fighter_equipment_4_desc: "战斗机设计采纳了新型电子科技，使高性能雷达得以小型化并集成于轻型平台。机载雷达赋予了战机超视距探测能力，增强了远程地面雷达目标指示效能。制导空空导弹的发展使导弹在战斗机发展历程中首次取代机炮，成为首选的攻击性武器。"
 jet_fighter_equipment_5: "1965 喷气式战斗机"
 jet_fighter_equipment_5_short: "1965 喷气式战斗机"
 jet_fighter_equipment_5_desc: "第三代战斗机是第二代战斗机技术积累的延续，但最显著的特点是重新强调机动性和传统的对地打击能力。在20世纪60年代，越来越多的导弹作战经验表明，空战正逐渐演变为近距离的缠斗。模拟航空电子设备开始引入，取代了老式的“蒸汽表”座舱仪表。"
 jet_fighter_equipment_6: "1970 喷气式战斗机"
 jet_fighter_equipment_6_short: "1970 喷气式战斗机"
 jet_fighter_equipment_6_desc: "在第三代战机的发展阶段，对地攻击能力得到大幅提升，主要体现在制导导弹技术的进步上。此外，也出现了首批真正有效的、用于提升对地攻击效果的航空电子设备，例如地形规避系统。 装备有光电对比导引头的空地导弹（ASM），如广泛应用的 AGM-65 “小牛” 导弹的早期型号，成为了标准配置武器。 同时，为了进一步提升精确打击能力，激光制导炸弹（LGB）也得到了普及。"
 jet_fighter_equipment_7: "1980 喷气式战斗机"
 jet_fighter_equipment_7_short: "1980 喷气式战斗机"
 jet_fighter_equipment_7_desc: ""
