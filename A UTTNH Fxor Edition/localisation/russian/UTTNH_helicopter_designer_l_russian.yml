 ##SOV
 ##Двигатель
 helicopter_jet_engine_1x: "1 x АШ-82В (1700 л.с.)"
 helicopter_jet_engine_1x_short: "1 x двигатель вертолёта I"
 helicopter_jet_engine_1x_desc: "Двухрядный звездообразный 14-цилиндровый поршневой двигатель с принудительным воздушным охлаждением. Двигатель устанавливался в наклонном положении в носовой части фюзеляжа, по бокам фюзеляжа размещены боковые воздухозаборники системы воздушного охлаждения с осевым вентилятором."
 helicopter_jet_engine_2x: "2 x ТВ2-117А (1500 л. с.)"
 helicopter_jet_engine_2x_short: "2 x двигателя вертолёта I"
 helicopter_jet_engine_2x_desc: "Двигатель предназначался для вертолёта Ми-8 и устанавливался на различные его модификации. Компрессор — 10-ступенчатый, с регулируемым входным направляющим аппаратом. Турбина компрессора — двухступенчатая, свободная турбина, приводящая полезную нагрузку — также двухступенчатая."
 helicopter_jet_engine_1x_1: "1 x ТВ3-117В (2200 л. с.)"
 helicopter_jet_engine_1x_1_short: "1 x двигатель вертолёта II"
 helicopter_jet_engine_1x_1_desc: "ТВ3-117 — семейство авиационных турбовальных двигателей. С момента создания было выпущено более 25 000 двигателей ТВ3-117 различных модификаций, общая наработка которых составляет более 16 млн часов. Один из самых надёжных авиационных двигателей в мире."
 helicopter_jet_engine_2x_1: "2 x ТВ3-117В (2200 л. с.)"
 helicopter_jet_engine_2x_1_short: "2 x двигателя вертолёта II"
 helicopter_jet_engine_2x_1_desc: "ТВ3-117 — семейство авиационных турбовальных двигателей. С момента создания было выпущено более 25 000 двигателей ТВ3-117 различных модификаций, общая наработка которых составляет более 16 млн часов. Один из самых надёжных авиационных двигателей в мире."
 helicopter_jet_engine_1x_2: "1 x ТВ3-117ВМA (2400 л. с.)"
 helicopter_jet_engine_1x_2_short: "1 x двигатель вертолёта III"
 helicopter_jet_engine_1x_2_desc: "ТВ3-117ВМА («ВМА» — высотный, модернизированный, модификация «А») — двигатель, разработанный для боевого вертолёта Ка-50. Конструктивной особенностью модификации является современная электронно-гидромеханическая система регулирования, управления и контроля двигателей."
 helicopter_jet_engine_2x_2: "2 x ТВ3-117ВМA (2400 л. с.)"
 helicopter_jet_engine_2x_2_short: "2 x двигателя вертолёта III"
 helicopter_jet_engine_2x_2_desc: "ТВ3-117ВМА («ВМА» — высотный, модернизированный, модификация «А») — двигатель, разработанный для боевого вертолёта Ка-50. Конструктивной особенностью модификации является современная электронно-гидромеханическая система регулирования, управления и контроля двигателей."
 helicopter_jet_engine_1x_3: "1 x ВК-2500 (2700 л. с.)"
 helicopter_jet_engine_1x_3_short: "1 x двигатель вертолёта IV"
 helicopter_jet_engine_1x_3_desc: "Дальнейшее развитие семейства двигателей ТВ3-117. Увеличен ресурс до первого капитального ремонта, повышена мощность на взлётном и чрезвычайном режимах, установлена новейшая система автоматического управления."
 helicopter_jet_engine_2x_3: "2 x ВК-2500 (2700 л. с.)"
 helicopter_jet_engine_2x_3_short: "2 x двигателя вертолёта IV"
 helicopter_jet_engine_2x_3_desc: "Дальнейшая развитие семейства двигателей ТВ3-117. Увеличен ресурс до первого капитального ремонта, повышена мощность на взлётном и чрезвычайном режимах, установлена новейшая система автоматического управления."
 
 ##Вооружение
 SOV_helicopter_saam: "9М39 «Игла-В»"
 SOV_helicopter_saam_desc: "Управляемая инфракрасная ракета класса "воздух-воздух" с малым радиусом действия. Предназначена для поражения медленно и среднелетящих воздушных целей. Скорость полета достигает 570-600 метров в секунду. Дальность применения ограничена пятью километрами. Игла способна выдерживать большие перегрузки и имеет отличные характеристики по помехозащите. Является средством типа "пустил-забыл", то есть полностью автоматическим комплексом слежения за целью."
 
 SOV_helicopter_cannon_1: "12,7-мм пулемёт ЯкБ-12,7"
 SOV_helicopter_cannon_1_desc: "Четырёхствольный авиационный пулемёт калибра 12,7 мм с вращающимся блоком стволов, модификация ЯкБ-12,7 с увеличенным до 4000—5000 выстр./мин темпом стрельбы, увеличенной до 750 выстрелов длиной непрерывной очереди и более высокой живучестью пулемёта (с 8000 до 12 000 выстрелов)."
 SOV_helicopter_cannon_2: "23-мм пушка ГШ-23Л"
 SOV_helicopter_cannon_2_desc: "Двуствольная автоматическая авиационная пушка, предназначенная для оснащения подвижных и неподвижных пушечных установок. В автоматической пушке ГШ-23 под одним кожухом размещены оба ствола и все механизмы, которые обеспечивают их поочерёдное заряжание. Работа автоматики основана на газоотводном двигателе, в котором подача ленты осуществляется общим механизмом, а при ведении огня пороховые газы подаются поочерёдно из обоих стволов."
 SOV_helicopter_cannon_3: "30-мм пушка 2A42"
 SOV_helicopter_cannon_3_desc: "Автоматическая пушка конструкции А. Г. Шипунова и В. П. Грязева, предназначена для поражения живой силы, легкобронированной техники и воздушных низколетящих целей. При отстреле всего боекомплекта (500 патронов) пушка не нуждается в промежуточном охлаждении. Стрельба возможна одиночным и автоматическим огнём, большим и малым темпом. Боепитание — селективное из двух патронных ящиков, снаряжаемых патронами с бронебойными и осколочно-фугасными снарядами."
 
 SOV_helicopter_bomb: "ОФАБ-250-270"
 SOV_helicopter_bomb_desc: "Осколочно-фугасная авиационная бомба ОФАБ-250-270 предназначена для поражения военно-промышленных объектов, легкоуязвимой и легкобронированной техники, живой силы."
 helicopter_rocket_pod: "80-мм НУР С-8"
 helicopter_rocket_pod_desc: "С-8 — 80-миллиметровая неуправляемая авиационная ракета, предназначенная для уничтожения техники и живой силы противника с воздуха. Ракета выпускается с несколькими видами боевых частей."
 SOV_helicopter_torpedo_mounting: "УМГТ-1"
 SOV_helicopter_torpedo_mounting_desc: "УМГТ-1 — малогабаритная бесследная электрическая самонаводящаяся торпеда калибра 400-мм для поражения надводных кораблей и подводных лодок. Входит в состав противолодочных ракетно-торпедных комплексов «Раструб-Б», «Водопад», «Ветер» др. Может применяться с самолётов противолодочной авиации."
 
 SOV_helicopter_atgm_1_1x: "1 x 9M17 «Фаланга-М»"
 SOV_helicopter_atgm_1_1x_short: "1 x «Фаланга-М»"
 SOV_helicopter_atgm_1_1x_desc: "9M17 «Фаланга-М» — авиационный вариант наземного противотанкового комплекса «Фаланга» предназначен для поражения танков и объектов бронетанковой техники противника при полуавтоматическом и ручном способе управления в условиях прямой оптической видимости."
 SOV_helicopter_atgm_1_2x: "2 x 9M17 «Фаланга-М»"
 SOV_helicopter_atgm_1_2x_short: "2 x «Фаланга-М»"
 SOV_helicopter_atgm_1_2x_desc: "9M17 «Фаланга-М» — авиационный вариант наземного противотанкового комплекса «Фаланга» предназначен для поражения танков и объектов бронетанковой техники противника при полуавтоматическом и ручном способе управления в условиях прямой оптической видимости."
 SOV_helicopter_atgm_2_2x: "2 x 9М113 «Штурм-В»"
 SOV_helicopter_atgm_2_2x_short: "2 x «Штурм-В»"
 SOV_helicopter_atgm_2_2x_desc: "Комплекс «Штурм-В» предназначен для поражения современных танков, боевых машин пехоты, пусковых установок ПТУР и ЗУР, долговременных огневых точек типа ДОТ и ДЗОТ, низколетящих малоскоростных воздушных целей, а также живой силы противника в укрытиях. Создан на базе наземного самоходного противотанкового комплекса «Штурм-С»."
 SOV_helicopter_atgm_2_4x: "4 x 9М113 «Штурм-В»"
 SOV_helicopter_atgm_2_4x_short: "4 x «Штурм-В»"
 SOV_helicopter_atgm_2_4x_desc: "Комплекс «Штурм-В» предназначен для поражения современных танков, боевых машин пехоты, пусковых установок ПТУР и ЗУР, долговременных огневых точек типа ДОТ и ДЗОТ, низколетящих малоскоростных воздушных целей, а также живой силы противника в укрытиях. Создан на базе наземного самоходного противотанкового комплекса «Штурм-С»."
 SOV_helicopter_atgm_3_2x: "2 x 9М120 «Атака-В»"
 SOV_helicopter_atgm_3_2x_short: "2 x «Атака-В»"
 SOV_helicopter_atgm_3_2x_desc: "Комплекс "Атака-В" предназначен для поражения современных танков, боевых машин пехоты, пусковых установок ПТУР и ЗУР, долговременных огневых точек типа ДОТ и ДЗОТ, низколетящих малоскоростных воздушных целей, а также живой силы противника в укрытиях. Комплекс создан на базе комплекса "Штурм-В" с использованием более мощного двигателя, который позволил увеличить дальность стрельбы комплекса, а также новой более мощной боевой части, обладающей большей бронепробиваемостью."
 SOV_helicopter_atgm_3_4x: "4 x 9М120 «Атака-В»"
 SOV_helicopter_atgm_3_4x_short: "4 x «Атака-В»"
 SOV_helicopter_atgm_3_4x_desc: "Комплекс "Атака-В" предназначен для поражения современных танков, боевых машин пехоты, пусковых установок ПТУР и ЗУР, долговременных огневых точек типа ДОТ и ДЗОТ, низколетящих малоскоростных воздушных целей, а также живой силы противника в укрытиях. Комплекс создан на базе комплекса "Штурм-В" с использованием более мощного двигателя, который позволил увеличить дальность стрельбы комплекса, а также новой более мощной боевой части, обладающей большей бронепробиваемостью."
 
 
