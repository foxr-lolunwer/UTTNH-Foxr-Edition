 gwtank_chassis: "战间期型坦克开发"
 gwtank_chassis_desc: "坦克在一战中证明了自己是一种强大的武器。 尽管在此之后坦克发展放缓，但毫无疑问，它将在未来的战争中发挥重要作用。"
 armor_tech_1: "基础装甲防护"
 armor_tech_1_desc: "一战期间的坦克只需要与敌人的轻武器抗衡。 因此，他们使用了相当薄的装甲。 但新一代的反坦克武器让战场成为对来说坦克更危险的地方，所以其需要更重的装甲。"
 armor_tech_2: "改进装甲防护"
 armor_tech_2_desc: "随着越来越先进的反坦克武器在世界各地投入使用，下一代坦克将会需要更好的防护。"
 armor_tech_3: "先进装甲防护"
 armor_tech_3_desc: "虽然反坦克武器的配置可能越来越接近极限，但现代坦克携带的更先进的武器使得我们仍然需要防护等级更高的装甲。"
 armor_tech_4: "现代装甲防护"
 armor_tech_4_desc: "在战争期间，坦克面临的威胁成倍增加，从敌方坦克、反坦克炮、专用的自行反坦克炮，一直到可以手持发射并击穿坦克装甲的现代步兵反坦克武器。 我们必须开发新的保护方法，让我们自己的坦克在面对这些威胁时保持存活。"
 armor_tech_5: "战后装甲防护"
 armor_tech_5_desc: "虽然超重型坦克可能不像人们曾经认为的那样有用，但新的焊接和铸造技术能够制造出极厚的钢，使其能够承受粗暴的对待。"
 armor_tech_7: "冷战初期装甲防护"
 armor_tech_7_desc: "复合装甲布局可以比同等厚度的钢板更好地保护弹药，同时重量更小。"
 armor_tech_9: "冷战中期装甲防护"
 armor_tech_9_desc: "相比于继续追求不切实际的装甲厚度，我们更应将资源投入到智能化装甲的研发上。 尽管此类装甲会占据更大的体积，但其重量将远低于传统钢制装甲。"
 armor_tech_10: "冷战末期装甲防护"
 armor_tech_10_desc: "装甲防护总是有进步的可能。无论是改良的化学物质，还是更强的复合材料，未来的坦克都将得到很好的保护。"
 armor_tech_11: "冷战后装甲防护"
 armor_tech_11_desc: "第三代主战坦克配备了先进的高速加农炮，可以穿透近1米厚的钢板，因此必须保护乘员和车辆。"
 engine_tech_1: "基础引擎"
 engine_tech_1_desc: "第一次世界大战时期的坦克是移动缓慢而笨拙的装甲巨兽。然而，如今的坦克极其依赖速度和机动性来取得胜利。"
 engine_tech_2: "改进引擎"
 engine_tech_2_desc: "装有更大火炮和更厚装甲的新一代坦克需要更强力的引擎来驱动。"
 engine_tech_3: "先进引擎"
 engine_tech_3_desc: "机动化作战是一种需要指挥官迅速决断、士兵迅速机动、补给迅速运输的作战形式。如果我们的坦克想要装备最新的武器，同时还想要安装足够在战场上生存的装甲，它们就需要更强大的引擎以跟上摩托化步兵的步伐。"
 engine_tech_4: "现代引擎"
 engine_tech_4_desc: "现代战争为坦克新增了许多必需的装备，这显著增加了坦克的重量。为了让这些庞然巨物动起来，我们必须拥有动力强大的引擎。"
 engine_tech_5: "战后引擎"
 engine_tech_5_desc: "尽管现代发动机已经相当强大，但总有可以取得的进步。诸如多管化油器和增压进气等新技术允许更高的动力输出。"
 engine_tech_7: "冷战初期引擎"
 engine_tech_7_desc: "随着坦克重量接近60吨，我们需要拥有一千马力以上的发动机来跟上其他机械化部队。"
 engine_tech_9: "冷战中期引擎"
 engine_tech_9_desc: "燃料质量和精密工程的改进，以及新材料的使用，使发动机能够推动车辆以高速行驶。"
 engine_tech_10: "冷战末期引擎"
 engine_tech_10_desc: "只有对现有模型进行改进是不够的。最终，我们需要为柴油和燃气涡轮发动机开发全新的设计，以充分利用新技术。"
 engine_tech_11: "冷战后引擎"
 engine_tech_11_desc: "现代坦克发动机必须兼具高速性能和高度可靠性——既要能适应多尘环境，又要确保在严寒条件下也能顺利启动。 通过采用燃油喷射和双增压技术，发动机可以输出超乎想象的强大动力。"
 DESIGNER_CHASSIS_BASE: "底盘： "
 DESIGNER_FROM_MODULES: "模块： "
 DESIGNER_UNSAVED_CHANGES: "未保存的变动： "
 tank_rocket_launcher: "火箭炮"
 tank_rocket_launcher_desc: "这是一款多管火箭发射器，用于发射非制导高爆火箭弹。 依靠其高密度的火力覆盖，能够有效地打击软目标，但即便直接命中也难以对装甲目标构成威胁。"
 tank_rocket_launcher_2: "改进型火箭炮"
 tank_rocket_launcher_2_desc: "虽然进行了准确性的升级，但是这种火箭炮最主要的改进还是可以携带更多的弹药，以向敌人施加更加致命的打击。"
 tank_wheeled_suspension: "轮式悬挂"
 tank_wheeled_suspension_desc: "这种悬挂源自于卡车底盘，承载能力和越野性能非常有限，但其具有制造成本低这一重要优势。"
 tank_half_track_suspension: "半履带悬挂"
 tank_half_track_suspension_desc: "该悬挂是全履带式车辆和常规轮式悬架之间的混合体，车辆前段装有一对车轮用于转向，后轮轴使用履带式悬挂以提高越野性能。虽然其承载能力有限，但仍比全履带设计便宜。"
 squeezebore_adaptor: "锥膛炮转接器"
 squeezebore_adaptor_desc: "火炮末端的特殊适配器降低了炮管末端的口径，这将把炮弹压缩到较小的口径，这会使得炮弹初速大幅度提升以此提高装甲穿透力。虽然这种技术可以以较低成本提升火炮穿深但是它需要特殊的稀有材料来制作火炮对应的弹药。"
 armor_skirts: "装甲裙板"
 armor_skirts_desc: "安装在车体侧面的一组金属薄板，能对反坦克枪及锥形装药提供额外防护。"
 dozer_blade: "推土铲"
 dozer_blade_desc: "装有推土铲的载具可以在战场上快速建立掩护，而无需工兵支援。"
 auto_loader: "自动装弹机"
 auto_loader_desc: "一种自动装填弹药的机械，可以让坦克长时间保持高速射击。"
 easy_maintenance: "易维护改装"
 easy_maintenance_desc: "车辆周围的舱口可以使许多不同车辆零部件通过，使得乘员可以非常容易地执行相当复杂的维护工作。"
 additional_machine_guns: "加装机枪"
 additional_machine_guns_desc: "一组车体机枪和同轴机枪能使坦克更有效地抵抗来犯的步兵。"
