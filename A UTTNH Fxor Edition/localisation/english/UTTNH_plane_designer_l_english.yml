 rocket_rails: "Rocket Rails"
 rocket_rails_desc: "Unguided projectiles hung under the wings. Since they are fired ahead of the attacking plane, it is a lot easier for the pilot to aim them at the target compared to bombs."
 rocket_pod: "Rocket Pod"
 rocket_pod_desc: "Launcher that contains several unguided rockets held in individual tubes, designed to be used by attack aircraft or attack helicopters for close air support."

 bomb_sights_1: "Bomb Sights I"
 bomb_sights_1_desc: "A complex mechanical computer that takes into account wind drift, terminal velocity and altitude allows the bombadier to drop bombs with a high degree of accuracy."
 bomb_sights_2: "Bomb Sights II"
 bomb_sights_2_desc: "Where previous generations of bomb sights often required a lengthy set-up process before they arrived at their targeting solutions, this fully stabilized bomb sight only takes a few seconds and can even compensate for shallow dives."
 bomb_sights_3: "Bomb Sights III"
 bomb_sights_3_desc: ""
 bomb_sights_4: "Bomb Sights IV"
 bomb_sights_4_desc: ""

 radio_navigation_1: "Radio Navigation I"
 radio_navigation_1_desc: "A radio reciever listening for the crossing of two fairly simple radio-navigation beams, making it possible to find a target even in perfect darkness."
 radio_navigation_2: "Radio Navigation II"
 radio_navigation_2_desc: "A radio reciever that also includes a number of distance measuring aides, telling the bombadier the exact moment that the bombs should be released, even if he can not see the target."
 radio_navigation_3: "Radio Navigation III"
 radio_navigation_3_desc: ""
 radio_navigation_4: "Radio Navigation IV"
 radio_navigation_4_desc: ""
 radio_navigation_5: "Radio Navigation V"
 radio_navigation_5_desc: ""
 radio_navigation_6: "Radio Navigation VI"
 radio_navigation_6_desc: ""
 radio_navigation_7: "Radio Navigation VII"
 radio_navigation_7_desc: ""

 air_ground_radar_1: "Air-Ground Radar I"
 air_ground_radar_1_desc: "An airborne radar set that gives the navigator an accurate picture of the surface below the plane, allowing for precise navigation even in darkness or bad weather."
 air_ground_radar_2: "Air-Ground Radar II"
 air_ground_radar_2_desc: "With a higher resolution than previous models, this radar set allows precision bombardment even through cloud cover."
 air_ground_radar_3: "Air-Ground Radar III"
 air_ground_radar_3_desc: ""
 air_ground_radar_4: "Air-Ground Radar IV"
 air_ground_radar_4_desc: ""
