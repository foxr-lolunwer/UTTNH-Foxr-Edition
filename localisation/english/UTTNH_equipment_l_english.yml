 CHI_infantry_equipment_6: "T65 Rifle"
 CHI_infantry_equipment_6_short: "T65 Rifle"
 CHI_infantry_equipment_6_desc: "The T65 is an assault rifle developed and manufactured by the Combined Logistics Command of the Republic of China Armed Forces. Originally patterned after the Armalite AR-18 that has a short-stroke gas system, the prototype unveiled in 1975 showed a rifle that is heavily influenced by the AR-15 family of rifles, albeit with modified iron sights, a reshaped stock, and redesigned handguards. The designated number '65' refers to the Year 65 of the Republic of China (1976), the year the rifle's design was finalized."
 CHI_infantry_equipment_7: "T65K Rifle"
 CHI_infantry_equipment_7_short: "T65K Rifle"
 CHI_infantry_equipment_7_desc: "The T65 is an assault rifle developed and manufactured by the Combined Logistics Command of the Republic of China Armed Forces. Originally patterned after the Armalite AR-18 that has a short-stroke gas system, the prototype unveiled in 1975 showed a rifle that is heavily influenced by the AR-15 family of rifles, albeit with modified iron sights, a reshaped stock, and redesigned handguards. The designated number '65' refers to the Year 65 of the Republic of China (1976), the year the rifle's design was finalized."
 CHI_infantry_equipment_8: "T86 Carbine Rifle"
 CHI_infantry_equipment_8_short: "T86 Carbine Rifle"
 CHI_infantry_equipment_8_desc: "The T86 rifle is a gas-operated, magazine-fed, assault rifle. It is the second original rifle design conducted by the 205th Armory of Combined Logistics Command of the Republic of China Armed Forces."
