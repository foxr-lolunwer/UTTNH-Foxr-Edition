 lc_heavy_naval_guns: "重型舰炮"
 lc_heavy_naval_guns_desc: "作为这种庞大装甲车辆的标准主武器，这些强大的海军级火炮经过改装用于直接对抗，能够对装甲和坚固目标造成毁灭性打击。"
 lc_super_heavy_railway_gun: "超重型列车炮"
 lc_super_heavy_railway_gun_desc: "这门巨大的火炮，最初为铁路平台而建,能够从极远的距离轰击目标，具有无与伦比的破坏力。"
 lc_high_impact_obliterator_cannon: "高冲击毁灭者加农炮"
 lc_high_impact_obliterator_cannon_desc: "专为穿透极厚装甲而设计，这种武器具有极高的动能，是对抗其他超重型坦克的强大武器。"
 lc_heavy_anti_air_platform: "重型防空平台"
 lc_heavy_anti_air_platform_desc: "装备多门大口径防空炮的平台，用于防御威胁到陆地巡洋舰的敌方轰炸机和侦察机。"
 lc_medium_naval_guns: "中型舰炮"
 lc_medium_naval_guns_desc: "提供火力与射速的平衡组合，这些火炮在对付轻型车辆和支援非装甲目标方面非常有效。"
 lc_hull_mounted_railway_gun: "舰载列车炮"
 lc_hull_mounted_railway_gun_desc: "一门直接集成到车体中的列车炮，提供重火力支援，能够以高精度打击远程目标。"
 lc_super_heavy_howitzer: "超重型榴弹炮"
 lc_super_heavy_howitzer_desc: "设计用于摧毁防御工事和城市防御的巨型榴弹炮。这种变体专门用于发射高爆弹，适合清除战壕和摧毁坚固的防御结构。"
 lc_heavy_high_velocity_cannons: "重型高速火炮"
 lc_heavy_high_velocity_cannons_desc: "反坦克炮专为准确打击并摧毁敌方装甲而设计。其高速弹丸确保了远距离的优秀穿透力。"
 lc_heavy_anti_air_battery: "重型防空炮组"
 lc_heavy_anti_air_battery_desc: "装备大口径火炮的炮台，用于瞄准高速和高空飞行器，在车辆周围提供防御保护。"
 lc_medium_cannon_turret: "中型火炮炮塔"
 lc_medium_cannon_turret_desc: "标准的炮塔式火炮，能够对抗步兵和轻型车辆。其紧凑的设计使其在近距离战斗和次要任务中用途广泛。"
 lc_assault_gun: "突击炮"
 lc_assault_gun_desc: "专为近距离城市战和摧毁掩体而设计。这种武器发射威力强大的高爆弹，用于清除步兵和难以拔除的目标。"
 lc_high_velocity_cannon_turret: "高速火炮炮塔"
 lc_high_velocity_cannon_turret_desc: "装备高速火炮的炮塔，用于对抗敌方装甲。其较小的尺寸使其能够快速响应并提供对轻型装甲威胁的火力支援。"
 lc_light_anti_air_battery: "轻型防空炮组"
 lc_light_anti_air_battery_desc: "轻型防空炮，设计用于打击低空飞行的飞机，保护车辆免受扫射和俯冲轰炸。"
 lc_flamethrower_turret: "火焰喷射炮塔"
 lc_flamethrower_turret_desc: "一座专门的火焰喷射炮，适合清除防御工事、步兵和伏击点。非常适合在密集的城市环境中进行近距离作战。"
 lc_rocket_launcher: "火箭炮"
 lc_rocket_launcher_desc: "安装在陆地巡洋舰上的模块化火箭系统，能够发射毁灭性的火箭弹幕，压制敌方防御并压制大规模编队。"
 lc_radio_1: "$tank_radio_1$"
 lc_radio_1_desc: "$tank_radio_1_desc$"
 lc_radio_2: "$tank_radio_2$"
 lc_radio_2_desc: "$tank_radio_2_desc$"
 lc_radio_3: "$tank_radio_3$"
 lc_radio_3_desc: "$tank_radio_3_desc$"
 lc_command_center: "指挥中心"
 lc_command_center_desc: "一个完全集成的指挥中心,将陆地巡洋舰变为移动总部，配备先进的通信系统，用于协调大规模军事行动。"
 lc_radar: "雷达"
 lc_radar_desc: "一个早期预警系统，增强对敌方的飞行器和附近部队的预警，使陆地巡洋舰能够为潜在的空中或地面威胁做好准备。"
 lc_aircraft_catapult: "飞机弹射器"
 lc_aircraft_catapult_desc: "一个小型侦察机发射系统，使陆地巡洋舰能够侦察远程区域并提供实时战场情报。"
 lc_helipad: "直升机坪"
 lc_helipad_desc: "直升机起降平台，用于提供高级空中侦察并提升战场态势感知能力。"
 lc_armored_skirts: "装甲裙板"
 lc_armored_skirts_desc: "沿车身两侧安装的强化装甲板，保护易受攻击的履带和悬挂系统免受反坦克武器和轻武器的伤害。"
 lc_bunker_emplacement: "掩体安放装置"
 lc_bunker_emplacement_desc: "内部加固结构，将陆地巡洋舰变为移动掩体。即使在遭受重火力攻击时，车组人员也能保持防御阵地并向敌方还击。"
 lc_obstacle_clearance_gear: "清障装备"
 lc_obstacle_clearance_gear_desc: "重型附件，如巨型推土机铲和起重机，用于清除碎片、在困难地形上开辟道路并协助挖掘作业。"
 lc_internal_fuel_tanks: "内部燃料箱"
 lc_internal_fuel_tanks_desc: "车体内扩展的燃料舱室，增加车辆的作战范围，减少在长期战役中频繁加油的需要。"
 lc_internal_ammunition_compartments: "内部弹药舱"
 lc_internal_ammunition_compartments_desc: "强化的储存区域，用于携带额外弹药，使陆地巡洋舰能够在缺乏后勤补给的情况下维持长期战斗。"
 lc_wet_ammunition_storage: "湿式弹药架"
 lc_wet_ammunition_storage_desc: "专门的液体冷却舱，用于减少弹药因敌方命中引发爆炸的风险，大大提高车组人员的安全性。"
 lc_smoke_generators: "烟雾发生器"
 lc_smoke_generators_desc: "一套能够释放浓厚的烟幕的系统，掩盖车辆的行动并降低其在地面和空中威胁中的能见度。"
 lc_stabilizers: "稳定器"
 lc_stabilizers_desc: "用于减少后坐力并保持火炮准心的机械设备，使车辆在短暂停留时能够更快地重新瞄准并提高射击精度。"