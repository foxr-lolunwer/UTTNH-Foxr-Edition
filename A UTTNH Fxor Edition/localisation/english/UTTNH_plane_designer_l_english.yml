 medium_plane_airframe_0: "Inter-War Medium Airframe"
 medium_plane_airframe_0_desc: "While able to carry a significant payload over a long distance, the growth potential of this airframe is severely limited."
 medium_plane_airframe_1: "Basic Medium Airframe"
 medium_plane_airframe_1_desc: "Incorporating a number of new technologies developed recently, this airframe is significantly more capable than previous planes of similar size."
 medium_plane_airframe_2: "Improved Medium Airframe"
 medium_plane_airframe_2_desc: "Taking advantage of modern production technologies, this airframe allows the plane to carry a bigger payload over a longer distance."
 medium_plane_airframe_3: "Advanced Medium Airframe"
 medium_plane_airframe_3_desc: "Engineered to maximize performance and payload, this airframe represents the pinnacle of conventionally-powered airplanes."
 medium_plane_airframe_4: "50's Medium Airframe"
 medium_plane_airframe_4_desc: "With jet-powered planes likely to become dominant, engineers are starting to figure out how to build airframes with jet propulsion in mind."
